name: Publish Subtitle Player to DUFS

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish_subtitle_player_to_dufs.yml'
      - 'subtitle_video_player/subtitle_video_player.html'
      - 'subtitle_video_player/js/**'
      - 'subtitle_video_player/assets/**'
      - 'subtitle_video_player/package.json'
      - 'subtitle_video_player/scripts/build_single-html.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checkout-and-publish:
    runs-on: ubuntu-latest

    env:
      PLAYER_CODE_FOLDER_NAME: subtitle_video_player
      LOCAL_HTML_FILE_NAME: subtitle_video_player.single.html
      REMOTE_HTML_FILE_NAME: subtitle_video_player.single.html
      UPLOAD_FOLDER_NAME: subtitleVideoPlayer

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build single-file subtitle player
        run: |
          cd ${{ env.PLAYER_CODE_FOLDER_NAME }}
          pnpm run build:single-html

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: subtitle-player-latest
        run: |
          gh release delete "${RELEASE_TAG}" --cleanup-tag --yes || true
          gh release create "${RELEASE_TAG}" \
            "${{ env.PLAYER_CODE_FOLDER_NAME }}/${{ env.LOCAL_HTML_FILE_NAME }}" \
            --target "${GITHUB_SHA}" \
            --title "Video Subtitle Player (latest)" \
            --notes "Generated from ${GITHUB_SHA} in ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --latest

      - name: Publish to DUFS
        run: |
          cd ${{ env.PLAYER_CODE_FOLDER_NAME }}
          curl -T ${{ env.LOCAL_HTML_FILE_NAME }} ${{ vars.DUFS_BASE_URL }}/${{ env.UPLOAD_FOLDER_NAME }}/${{ env.REMOTE_HTML_FILE_NAME }}
