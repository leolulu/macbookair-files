<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Video Player with Subtitles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/vendor/jquery/jquery-ui-1.13.2.css">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #container {
            --divider-width: 4px;
            --landscape-subtitles-width: 33%;
            --portrait-subtitles-width: 60%;
            display: grid;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
        }

        #container.layout-landscape {
            grid-template-rows: auto minmax(0, 1fr);
        }

        #container.layout-landscape:not(.layout-reversed) {
            grid-template-columns: minmax(0, calc(100% - var(--landscape-subtitles-width) - var(--divider-width))) var(--divider-width) minmax(0, var(--landscape-subtitles-width));
            grid-template-areas:
                "video divider subtitles"
                "options divider subtitles";
        }

        #container.layout-landscape.layout-reversed {
            grid-template-columns: minmax(0, var(--landscape-subtitles-width)) var(--divider-width) minmax(0, calc(100% - var(--landscape-subtitles-width) - var(--divider-width)));
            grid-template-areas:
                "subtitles divider video"
                "subtitles divider options";
        }

        #container.layout-portrait {
            grid-template-rows: auto minmax(220px, 1fr);
            overflow-y: auto;
        }

        #container.layout-portrait:not(.layout-reversed) {
            grid-template-columns: minmax(0, calc(100% - var(--portrait-subtitles-width) - var(--divider-width))) var(--divider-width) minmax(0, var(--portrait-subtitles-width));
            grid-template-areas:
                "video video video"
                "options divider subtitles";
        }

        #container.layout-portrait.layout-reversed {
            grid-template-columns: minmax(0, var(--portrait-subtitles-width)) var(--divider-width) minmax(0, calc(100% - var(--portrait-subtitles-width) - var(--divider-width)));
            grid-template-areas:
                "video video video"
                "subtitles divider options";
        }

        #video-player {
            grid-area: video;
            min-width: 0;
            overflow: auto;
            align-self: flex-start;
        }

        #container.layout-portrait #video-player {
            overflow: visible;
        }

        #video {
            width: 100%;
            display: block;
        }

        #container.layout-portrait #video {
            height: auto !important;
        }

        #divider {
            grid-area: divider;
            cursor: col-resize;
            border-left: 1px solid #aaa;
            box-sizing: border-box;
            width: var(--divider-width);
            min-width: var(--divider-width);
            z-index: 2;
        }

        #subtitles {
            grid-area: subtitles;
            min-height: 0;
            min-width: 0;
            overflow: auto;
            height: auto;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
        }

        .subtitle {
            cursor: pointer;
            padding-top: 2px;
            padding-bottom: 3px;
            border-bottom: 1px dashed #d1c4c4;
            font-size: 18px;
            font-family: PingFang SC, Hiragino Sans GB, Microsoft Yahei, Arial, sans-serif;
            position: relative;
            border-right: 10px solid transparent;
            line-height: 28px;
        }

        .subtitle:nth-child(even) {
            color: #C2571A;
        }

        .subtitle:nth-child(odd) {
            color: #107896;
        }

        .subtitle:hover {
            color: #7b1fa2;
            border-right: 10px solid #E0E0E0;
        }

        .subtitle-word.highlight {
            color: #FFFFFF;
            background-color: #336DF4;
        }

        .subtitle.highlight {
            border-right: 10px solid red;
            background-image: url('data:image/png;base64, iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsIAAA7CARUoSoAAAAANSURBVBhXY3j58uV/AAk1A7vMebz/AAAAAElFTkSuQmCC');
        }

        .transparent-sentence {
            color: transparent;
            position: absolute;
            left: 0;
            top: 2px;
            pointer-events: none;
            user-select: none;
        }

        #videoFileNameContainer {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            margin: 10px;
            font-weight: 800;
        }

        #video-meta-options-slot {
            display: block;
            width: 100%;
        }

        #video-meta-options-slot:empty {
            display: none;
        }

        #video-meta-options-slot #videoFileNameContainer {
            box-sizing: border-box;
            display: flex;
            flex-direction: row-reverse;
            gap: 10px;
            justify-content: space-between;
            margin: 0 8px 4px 0 !important;
            white-space: nowrap;
            width: calc(100% - 8px);
        }

        #video-meta-options-slot #videoFileName {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #video-meta-options-slot #videoDurationInfo {
            flex: 0 0 auto;
            margin-right: 0;
        }

        .videoFileNameContainer-alternative-margin {

        }

        #videoFileName {

        }

        #videoDurationInfo {
            color: #84509d;
            margin-right: 20px;
        }

        #videoDurationInfoMin {

            font-size: 10px;
        }

        #horizontal-divider {
            cursor: ns-resize;
            border-top: 1px solid #aaa;
            height: 5px;
        }

        #textLength,
        #mediaGain,
        #sideListSupHeight {

        }

        #videoUrl {
            max-width: 9rem;
        }

        #dufsUrl {
            width: 13.1rem;
        }

        .dufs-url-history-wrapper {
            position: relative;
            display: inline-block;
        }

        .dufs-url-history-list {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1200;
            display: none;
            width: min(34rem, 82vw);
            box-sizing: border-box;
            max-width: calc(100vw - 16px);
            max-height: 14rem;
            overflow-y: auto;
            padding: 4px;
            background: #fff;
            border: 1px solid #d8e2ee;

        .dufs-url-history-list.visible {

        }

        .dufs-url-history-item {

            align-items: center;

            width: 100%;
            padding: 5px 6px 5px 8px;
            border: 0;
            border-radius: 4px;

            color: #1f2f46;

        }

        .dufs-url-history-text {

        }

        .dufs-url-history-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            width: 26px;
            height: 26px;
            border: 0;
            border-radius: 4px;
            background: #e8eef6;

            line-height: 1;

        }

        .dufs-url-history-remove:hover {

            color: #334155;
        }

        .dufs-url-history-item:hover,
        .dufs-url-history-item.active {
            background: #f2f6fb;
        }

        #skipInterval,
        #sentenceExtension,
        #scaleSupCaption {
            max-width: 2.2rem;
        }

        #timeConcat {
            max-width: 3rem;
        }

        .none-blur {
            filter: blur(0px);
            transition: filter 0.5s ease;
        }

        .censored {
            filter: blur(5px);
            transition: filter 0.2s ease;
        }

        .censored:hover {
            filter: none;
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .blinking {
            animation: blink 0.25s ease infinite;
        }

        #caption {
            position: absolute;
            left: 20px;
            max-width: 80%;
            bottom: 6%;
            color: #FFFFFF;
            text-align: center;
            font-size: 26px;
            font-family: PingFang SC, Hiragino Sans GB, Microsoft Yahei, Arial, sans-serif;
            font-weight: 400;
            line-height: 33px;
            display: none;
        }

        .video_container {
            position: relative;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            z-index: 1001;

        }

        #loadSelectedFiles {

        }

        #fileListContainer {

        }

        .dufs-tree-toolbar {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;

        }

        .dufs-tree-toolbar button {

            padding: 3px 8px;

        }

        #dufsTreeStatus {
            color: #555;
            font-size: 13px;
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dufs-tree-filter {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: clamp(260px, 38vw, 420px);
            flex: 0 0 clamp(260px, 38vw, 420px);
        }

        #dufsTreeFilter {
            width: 100%;
            height: 28px;
            box-sizing: border-box;
            padding: 3px 32px 3px 8px;
            border: 1px solid #b8c4d4;

        #dufsTreeFilter:focus {

        }

        #dufsTreeFilter.dufs-filter-fallback {
            border-color: #d8bc64;
            background: #fffdf5;
        }

        .dufs-tree-toolbar .dufs-tree-filter-clear {
            position: absolute;
            top: 50%;
            right: 3px;
            width: 22px;
            height: 22px;
            box-sizing: border-box;
            padding: 0;
            border: 0;
            border-radius: 4px;
            display: none;
            align-items: center;
            justify-content: center;
            transform: translateY(-50%);
            background: #e8eef6;
            color: #8aa0b8;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
        }

        .dufs-tree-toolbar .dufs-tree-filter-clear.visible {

        }

        .dufs-tree-toolbar .dufs-tree-filter-clear:hover {

        #fileList {

            padding-right: 8px;
        }

        .dufs-tree {

            --dufs-tree-muted: #8aa0b8;
            --dufs-tree-line: #dbe5f1;
            --dufs-tree-hover: #f8fafc;
            color: var(--dufs-tree-text);
            font-size: 15px;
        }

        .dufs-tree,
        .dufs-tree ul {
            list-style: none;
            margin: 0;
            padding-left: 0;
        }

        .dufs-tree ul {
            position: relative;
            margin-left: 20px;

        }

        .dufs-tree ul::before {

        .dufs-tree li.dufs-collapsed>ul {

        }

        .dufs-tree-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
            width: min(360px, 100%);
            padding: 3px 8px;

        .dufs-tree-row:hover {

        }

        .dufs-file-row {
            min-height: 25px;
            padding-top: 1px;
            padding-bottom: 1px;
        }

        .dufs-toggle {

            min-width: 26px;

        .dufs-toggle:hover {

        .dufs-toggle-placeholder {

        .dufs-toggle svg,

        .dufs-node-icon {

        .dufs-dir-icon {

        .dufs-file-icon {

        }

        .dufs-file-icon-video {

        .dufs-file-icon-subtitle {

        .dufs-file-icon-data {

        .dufs-node-name {

        .progress-container {
            position: relative;
            width: 98%;
            margin-left: 1%;
            margin-right: 1%;
            margin-top: 7px;
            box-sizing: border-box;

        }

        .progress-bar,

        #progress-bar-temp {

        .options-container label {

        #options-pane {

        .warning-sign {

        #subtitles .sup-subtitle-pending {

        #subtitleSyncStatus {

        #toastContainer {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 3000;
            pointer-events: none;
            max-width: min(360px, calc(100vw - 32px));
        }

        .floating-toast {
            background: rgba(28, 32, 40, 0.94);
            color: #F7F9FC;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.45;
            transform: translateY(-6px);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .floating-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .floating-toast.toast-success {
            border-left: 4px solid #00B578;
        }

        .floating-toast.toast-info {

        .floating-toast.toast-warning {

        }

        .floating-toast.toast-error {
            border-left: 4px solid #E5484D;
        }

        /* ===== AI 对话浮窗 ===== */
        .ai-chat-window {
            position: fixed;
            left: 16px;
            bottom: 16px;
            width: 420px;
            height: 520px;
            min-width: 300px;
            min-height: 260px;
            max-width: 96vw;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #d0d4dc;
            border-radius: 10px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
            z-index: 900;
            box-sizing: border-box;
            resize: none;
            overflow: hidden;
            transition: box-shadow 0.16s ease;
        }

        .ai-chat-window[hidden] {
            display: none;
        }

        .ai-chat-window.ai-chat-resizing {
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.26), 0 0 0 1px rgba(77, 141, 255, 0.2);
        }

        .ai-chat-resize-handle {
            position: absolute;
            z-index: 10;
            touch-action: none;
        }

        .ai-chat-resize-handle::after {
            content: "";
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.14s ease, box-shadow 0.14s ease;
        }

        .ai-chat-resize-n,
        .ai-chat-resize-s {
            left: 14px;
            right: 14px;
            height: 8px;
            cursor: ns-resize;
        }

        .ai-chat-resize-n {
            top: 0;
        }

        .ai-chat-resize-s {
            bottom: 0;
        }

        .ai-chat-resize-n::after,
        .ai-chat-resize-s::after {
            left: 50%;
            width: 42px;
            height: 2px;
            border-radius: 2px;
            background: #4d8dff;
            transform: translateX(-50%);
        }

        .ai-chat-resize-n::after {
            top: 1px;
        }

        .ai-chat-resize-s::after {
            bottom: 1px;
        }

        .ai-chat-resize-e,
        .ai-chat-resize-w {
            top: 14px;
            bottom: 14px;
            width: 8px;
            cursor: ew-resize;
        }

        .ai-chat-resize-e {
            right: 0;
        }

        .ai-chat-resize-w {
            left: 0;
        }

        .ai-chat-resize-e::after,
        .ai-chat-resize-w::after {
            top: 50%;
            width: 2px;
            height: 42px;
            border-radius: 2px;
            background: #4d8dff;
            transform: translateY(-50%);
        }

        .ai-chat-resize-e::after {
            right: 1px;
        }

        .ai-chat-resize-w::after {
            left: 1px;
        }

        .ai-chat-resize-ne,
        .ai-chat-resize-se,
        .ai-chat-resize-sw,
        .ai-chat-resize-nw {
            width: 14px;
            height: 14px;
        }

        .ai-chat-resize-ne {
            top: 0;
            right: 0;
            cursor: nesw-resize;
        }

        .ai-chat-resize-se {
            right: 0;
            bottom: 0;
            cursor: nwse-resize;
        }

        .ai-chat-resize-sw {
            bottom: 0;
            left: 0;
            cursor: nesw-resize;
        }

        .ai-chat-resize-nw {
            top: 0;
            left: 0;
            cursor: nwse-resize;
        }

        .ai-chat-resize-ne::after,
        .ai-chat-resize-se::after,
        .ai-chat-resize-sw::after,
        .ai-chat-resize-nw::after {
            width: 7px;
            height: 7px;
        }

        .ai-chat-resize-ne::after {
            top: 2px;
            right: 2px;
            border-top: 2px solid #4d8dff;
            border-right: 2px solid #4d8dff;
            border-radius: 0 3px 0 0;
        }

        .ai-chat-resize-se::after {
            right: 2px;
            bottom: 2px;
            border-right: 2px solid #4d8dff;
            border-bottom: 2px solid #4d8dff;
            border-radius: 0 0 3px 0;
        }

        .ai-chat-resize-sw::after {
            bottom: 2px;
            left: 2px;
            border-bottom: 2px solid #4d8dff;
            border-left: 2px solid #4d8dff;
            border-radius: 0 0 0 3px;
        }

        .ai-chat-resize-nw::after {
            top: 2px;
            left: 2px;
            border-top: 2px solid #4d8dff;
            border-left: 2px solid #4d8dff;
            border-radius: 3px 0 0 0;
        }

        .ai-chat-resize-handle:hover::after,
        .ai-chat-resize-handle.is-active::after {
            opacity: 0.85;
            box-shadow: 0 0 7px rgba(77, 141, 255, 0.42);
        }

        .ai-chat-resize-handle.is-active::after {
            opacity: 1;
        }

        body.ai-chat-resizing {
            user-select: none;
        }

        body.ai-chat-resizing * {
            cursor: inherit !important;
        }

        .ai-chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 10px;
            background: #f3f5f9;
            border-bottom: 1px solid #e3e6ee;
            cursor: move;
            user-select: none;
            touch-action: none;
            flex: 0 0 auto;
        }

        .ai-chat-title {
            font-weight: 700;
            font-size: 14px;
            color: #2b3245;
            white-space: nowrap;
        }

        .ai-chat-header-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ai-chat-header-actions button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 29px;
            min-width: 29px;
            margin: 0;
            padding: 0 9.5px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            box-shadow: none;
            color: #566075;
            font-family: inherit;
            font-size: 12.5px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
            transition: color 0.14s ease, background-color 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, transform 0.08s ease;
        }

        #aiChatNewConversation {
            margin-right: 3px;
            border-color: #dce2eb;
            background: rgba(255, 255, 255, 0.72);
            color: #3f485a;
        }

        #aiChatSettingsToggle,
        #aiChatClose {
            width: 29px;
            padding: 0;
        }

        #aiChatSettingsToggle {
            font-size: 16.5px;
        }

        #aiChatClose {
            font-size: 0;
        }

        #aiChatClose::before {
            content: "";
            width: 11.5px;
            height: 1.5px;
            border-radius: 999px;
            background: currentColor;
        }

        .ai-chat-header-actions button:hover {
            border-color: #d3dae6;
            background: #e8edf5;
            color: #273247;
        }

        .ai-chat-header-actions button:active {
            background: #dfe5ef;
            transform: translateY(1px);
        }

        .ai-chat-header-actions button:focus-visible {
            outline: none;
            border-color: #8eb2f5;
            box-shadow: 0 0 0 2px rgba(77, 141, 255, 0.2);
        }

        .ai-chat-settings {
            padding: 8px 10px;
            border-bottom: 1px solid #e3e6ee;
            background: #fafbfe;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
            flex: 0 0 auto;
        }

        .ai-chat-settings[hidden] {
            display: none;
        }

        .ai-chat-settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .ai-chat-selection-bubble-setting {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .ai-chat-selection-bubble-setting label {
            flex: 0 0 auto;
        }

        #aiSelectionBubblePosition {
            flex: 1 1 auto;
            min-width: 0;
            width: 0;
            height: 28px;
            box-sizing: border-box;
            padding: 0 8px;
            font: inherit;
        }

        .ai-chat-setting-help {
            flex: 0 0 auto;
            width: 17px;
            height: 17px;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border: 1px solid #aab3c1;
            border-radius: 50%;
            background: #fff;
            color: #6b7280;
            font: inherit;
            font-size: 10px;
            font-weight: 600;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: help;
        }

        .ai-chat-setting-help:hover {
            border-color: #2f5fbf;
            background: #f3f6ff;
            color: #2f5fbf;
        }

        .ai-chat-setting-help:focus-visible {
            outline: none;
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(77, 141, 255, 0.28);
        }

        .ai-chat-routing-wrap {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            padding: 0 6px;
        }

        .ai-chat-routing-fields {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 14px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .ai-chat-settings .ai-chat-routing-row {
            min-width: 0;
        }

        #aiChatModelRefresh {
            flex: 0 0 auto;
            width: 28px;
            height: 28px;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            border: 1px solid #d0d5e0;
            border-radius: 6px;
            background: #fff;
            color: #4b5563;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
        }

        #aiChatModelRefresh:hover:not(:disabled) {
            background: #f3f6ff;
            border-color: #9db7ef;
            color: #2f5fbf;
        }

        #aiChatModelRefresh:active:not(:disabled) {
            background: #e8efff;
        }

        #aiChatModelRefresh:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        #aiChatModelRefresh:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px rgba(77, 141, 255, 0.28);
        }

        #aiChatModelRefresh svg {
            width: 15px;
            height: 15px;
            display: block;
        }

        #aiChatModelRefresh.ai-chat-model-refresh-spinning svg {
            animation: aiChatModelRefreshSpin 0.85s linear infinite;
        }

        @keyframes aiChatModelRefreshSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .ai-chat-routing-label {
            display: inline-flex;
            align-items: center;
            height: 28px;
            line-height: 1;
        }

        .ai-chat-routing-row select {
            flex: 1 1 auto;
            min-width: 0;
            width: 100%;
            height: 28px;
            box-sizing: border-box;
            padding: 0 8px;
            font: inherit;
        }

        .ai-chat-settings select:disabled,
        .ai-chat-settings input:disabled {
            cursor: not-allowed;
            opacity: 0.62;
        }

        #aiChatBackendUrl {
            flex: 1 1 auto;
            min-width: 0;
        }

        #aiChatModelHint {
            margin: 0 6px;
            color: #6b7280;
            font-size: 12px;
            line-height: 1.35;
            white-space: normal;
        }

        #aiChatModelHint.ai-chat-model-hint-error {
            color: #b5473c;
        }

        #aiChatContextInfo {
            color: #6B7280;
            font-size: 12px;
        }

        .ai-chat-messages {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 底部滚动缓冲:允许最后一条消息向上滚动至消息区一半高度 */
        .ai-chat-messages::after {
            content: '';
            flex: 0 0 50%;
        }

        .ai-chat-msg {
            max-width: 92%;
            padding: 7px 10px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .ai-chat-msg-user {
            align-self: flex-end;
            background: #e8f0fe;
            color: #1f2a44;
            border-bottom-right-radius: 3px;
        }

        .ai-chat-msg-ai {
            align-self: flex-start;
            background: #f4f5f7;
            color: #22262e;
            border-bottom-left-radius: 3px;
        }

        .ai-chat-msg-ai.ai-chat-streaming::after {
            content: '▌';
            color: #4D8DFF;
            animation: aiChatCursorBlink 0.9s step-end infinite;
        }

        @keyframes aiChatCursorBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .ai-chat-msg-ai.ai-chat-msg-error {
            background: #fdecea;
            color: #94261f;
        }

        .ai-chat-error-line {
            margin-top: 6px;
            font-weight: 600;
        }

        /* ===== AI 气泡内 markdown 样式(紧凑聊天风) ===== */
        .ai-chat-msg-ai.ai-chat-md {
            white-space: normal;
        }

        .ai-chat-msg-ai.ai-chat-md>*:first-child {
            margin-top: 0;
        }

        .ai-chat-msg-ai.ai-chat-md>*:last-child {
            margin-bottom: 0;
        }

        .ai-chat-msg-ai.ai-chat-md p {
            margin: 6px 0;
        }

        .ai-chat-msg-ai.ai-chat-md h1,
        .ai-chat-msg-ai.ai-chat-md h2,
        .ai-chat-msg-ai.ai-chat-md h3,
        .ai-chat-msg-ai.ai-chat-md h4,
        .ai-chat-msg-ai.ai-chat-md h5,
        .ai-chat-msg-ai.ai-chat-md h6 {
            margin: 10px 0 6px;
            line-height: 1.35;
        }

        .ai-chat-msg-ai.ai-chat-md h1 {
            font-size: 1.25em;
        }

        .ai-chat-msg-ai.ai-chat-md h2 {
            font-size: 1.15em;
        }

        .ai-chat-msg-ai.ai-chat-md h3 {
            font-size: 1.08em;
        }

        .ai-chat-msg-ai.ai-chat-md h4,
        .ai-chat-msg-ai.ai-chat-md h5,
        .ai-chat-msg-ai.ai-chat-md h6 {
            font-size: 1em;
        }

        .ai-chat-msg-ai.ai-chat-md ul,
        .ai-chat-msg-ai.ai-chat-md ol {
            margin: 6px 0;
            padding-left: 22px;
        }

        .ai-chat-msg-ai.ai-chat-md li {
            margin: 2px 0;
        }

        .ai-chat-msg-ai.ai-chat-md code {
            background: #e9ebf0;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.92em;
            font-family: Consolas, Menlo, Monaco, 'Courier New', monospace;
        }

        .ai-chat-msg-ai.ai-chat-md pre {
            background: #f0f1f5;
            border: 1px solid #e2e5ec;
            border-radius: 6px;
            padding: 8px 10px;
            margin: 8px 0;
            overflow-x: auto;
        }

        .ai-chat-msg-ai.ai-chat-md pre code {
            background: none;
            padding: 0;
            font-size: 0.9em;
        }

        .ai-chat-msg-ai.ai-chat-md blockquote {
            margin: 8px 0;
            padding: 4px 10px;
            border-left: 3px solid #c5cbd6;
            color: #5a6270;
            background: rgba(0, 0, 0, 0.03);
        }

        .ai-chat-msg-ai.ai-chat-md table {
            border-collapse: collapse;
            margin: 8px 0;
            display: block;
            max-width: 100%;
            overflow-x: auto;
        }

        .ai-chat-msg-ai.ai-chat-md th,
        .ai-chat-msg-ai.ai-chat-md td {
            border: 1px solid #d5d9e2;
            padding: 4px 8px;
        }

        .ai-chat-msg-ai.ai-chat-md th {
            background: #f3f5f9;
        }

        .ai-chat-msg-ai.ai-chat-md hr {
            border: none;
            border-top: 1px solid #e0e3ea;
            margin: 10px 0;
        }

        .ai-chat-msg-ai.ai-chat-md a {
            color: #1a63d6;
        }

        .ai-chat-msg-meta {
            font-size: 12px;
            color: #9aa1ad;
            align-self: flex-start;
            margin-top: -4px;
        }

        .ai-chat-msg-quote {
            display: block;
            border-left: 3px solid #F7C137;
            background: rgba(247, 193, 55, 0.12);
            border-radius: 4px;
            padding: 3px 6px;
            margin-bottom: 5px;
            font-size: 12.5px;
            color: #6b5b22;
        }

        .ai-chat-time-link {
            color: #1a63d6;
            cursor: pointer;
            text-decoration: underline;
        }

        .ai-chat-retry-btn {
            margin-top: 5px;
            font-size: 12px;
            padding: 2px 10px;
            cursor: pointer;
            display: block;
        }

        .ai-chat-quote-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0 10px 6px;
            padding: 5px 8px;
            background: #fff8e6;
            border: 1px solid #f0e2b6;
            border-left: 3px solid #F7C137;
            border-radius: 6px;
            font-size: 12px;
            color: #6b5b22;
            flex: 0 0 auto;
        }

        .ai-chat-quote-chip[hidden] {
            display: none;
        }

        .ai-chat-quote-chip .ai-chat-quote-text {
            flex: 1 1 auto;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #aiChatQuoteRemove {
            flex: 0 0 auto;
            border: none;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
            color: #8a7a3a;
            padding: 0 3px;
        }

        .ai-chat-input-row {
            display: flex;
            gap: 8px;
            padding: 9px 10px;
            border-top: 1px solid #e3e6ee;
            flex: 0 0 auto;
            align-items: flex-end;
            background: #f8f9fc;
        }

        #aiChatInput {
            flex: 1 1 auto;
            min-width: 0;
            min-height: 36px;
            resize: none;
            border: 1px solid #cfd7e4;
            border-radius: 7px;
            outline: none;
            background: #fff;
            color: #2b3245;
            font-size: 14px;
            line-height: 1.4;
            max-height: 120px;
            padding: 7px 10px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.14s ease, box-shadow 0.14s ease;
        }

        #aiChatInput::placeholder {
            color: #8c95a5;
        }

        #aiChatInput:hover {
            border-color: #b9c5d6;
        }

        #aiChatInput:focus {
            border-color: #7fa8f3;
            box-shadow: 0 0 0 2px rgba(77, 141, 255, 0.16);
        }

        #aiChatSend {
            flex: 0 0 auto;
            height: 36px;
            padding: 0 16px;
            border: 1px solid #4d8dff;
            border-radius: 7px;
            outline: none;
            background: #4d8dff;
            box-shadow: 0 1px 2px rgba(45, 78, 135, 0.18);
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            line-height: 1;
            cursor: pointer;
            transition: background-color 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, transform 0.08s ease;
        }

        #aiChatSend:hover {
            border-color: #3f7fe9;
            background: #3f7fe9;
        }

        #aiChatSend:active {
            box-shadow: none;
            transform: translateY(1px);
        }

        #aiChatSend:focus-visible {
            box-shadow: 0 0 0 2px rgba(77, 141, 255, 0.24);
        }

        #aiChatSend.ai-chat-send-stop {
            background: #fdecea;
            border-color: #e5a29d;
            color: #94261f;
        }

        #aiChatSend.ai-chat-send-stop:hover {
            background: #f9ddda;
            border-color: #dc8e88;
        }

        #toggleAiChat.ai-chat-busy {
            animation: aiChatPulse 1.2s ease-in-out infinite;
        }

        @keyframes aiChatPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(77, 141, 255, 0.55);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(77, 141, 255, 0);
            }
        }

        /* 后台回答完成：绿色圆点；出错：红色圆点（见 ai-chat-unread-error） */
        #toggleAiChat.ai-chat-unread::after,
        #toggleAiChat.ai-chat-unread-error::after {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }

        #toggleAiChat.ai-chat-unread::after {
            background: #30a46c;
        }

        #toggleAiChat.ai-chat-unread-error::after {
            background: #e5484d;
        }

        .ai-selection-bubble {
            position: fixed;
            z-index: 950;
            display: flex;
            gap: 4px;
            background: #2b3245;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        }

        .ai-selection-bubble[hidden] {
            display: none;
        }

        .ai-selection-bubble button {
            background: transparent;
            border: none;
            color: #f0f3f9;
            font-size: 13px;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 5px;
            white-space: nowrap;
        }

        .ai-selection-bubble button:hover {
            background: #44507a;
        }

        @media (max-width: 700px) {
            .ai-chat-window {
                left: 2vw !important;
                top: 2vh !important;
                width: 96vw !important;
                height: 96vh !important;
                resize: none;
            }

            .ai-chat-resize-handle {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="container" class="layout-landscape">
        <div id="video-player">
            <div class="video_container">
                <video id="video" controls preload="auto" crossorigin="anonymous">
                    Your browser does not support HTML5 video.
                </video>
                <span id="caption">字幕（默认不显示），播放时更新</span>
                <div id="ff-sign" class="hide-element">⏩</div>
                <div id="resizable-shade"></div>
            </div>
            <div id="horizontal-divider"></div>
        </div>
        <div id="options-pane">
            <div class="options-container">
                <div id="video-meta-options-slot"></div>
                <input type="file" id="videoFile" accept=".mp4, .webm, .srt, .json, .ass, .html, .sup" multiple />
                <span id="videoPlaybackRate" class="inline-block-element">x1.0</span>
                <span id='videoFocusStatus' class="inline-block-element">❌<span style="color: red;">失焦</span></span>
                <span id='videoCanPlayStatus'>🔴</span>
                <div class="inline-block-element">
                    <label for="skipBlanks">跳过空白</label>
                    <input type="checkbox" id="skipBlanks" />
                </div>
                <div class="inline-options-container">
                    <label for="enableFFMode">快进式跳跃</label>
                    <input type="checkbox" id="enableFFMode" />
                    <label for="FFWithoutCalibration">无校准<span class='warning-sign'>⚠️</span></label>
                    <input type="checkbox" id="FFWithoutCalibration" />
                </div>
                <div class="inline-block-element">
                    <label for="enableSkipInterval">空白cap:</label>
                    <input type="number" id="skipInterval" value="0.5" step="0.1">
                    <input type="checkbox" id="enableSkipInterval" />
                </div>
                <div class="inline-block-element">
                    <label for="enableSentenceExtension">延展句长➰:</label>
                    <input type="number" id="sentenceExtension" value="0.3" step="0.1">
                    <input type="checkbox" id="enableSentenceExtension" />
                </div>
                <div class="inline-block-element">
                    <label for="clickToPlay">点击字幕播放</label>
                    <input type="checkbox" id="clickToPlay" />
                </div>
                <div class="inline-options-container">
                    <label for="textLength">句长:</label>
                    <input type="number" id="textLength" value="1">
                    <div class="inline-block-element">
                        <label for="enableTimeConcat">合并句间隔🔗:</label>
                        <input type="number" id="timeConcat" value="0.001" step="0.1">
                        <input type="checkbox" id="enableTimeConcat" />
                    </div>
                </div>
                <div class="inline-block-element">
                    <label for="hideControl">隐藏播放器控件</label>
                    <input type="checkbox" id="hideControl" />
                </div>
                <div class="inline-options-container">
                    <span>布局方向:</span>
                    <label for="layoutOrientationLandscape">横屏</label>
                    <input type="radio" name="layoutOrientation" id="layoutOrientationLandscape" value="landscape" />
                    <label for="layoutOrientationPortrait">竖屏</label>
                    <input type="radio" name="layoutOrientation" id="layoutOrientationPortrait" value="portrait" />
                </div>
                <div class="inline-block-element">
                    <label for="toggleLayout">反转布局</label>
                    <input type="checkbox" id="toggleLayout" />
                </div>
                <div class="inline-block-element">
                    <label for="mediaGain">强制放大音量🔊:</label>
                    <input type="number" id="mediaGain" value="1">
                </div>
                <div class="inline-block-element">
                    <input type="text" id="videoUrl" placeholder="粘贴视频url,弹框选字幕">
                    <button id="loadVideoUrl">加载</button>
                </div>
                <input type="file" id="VideoUrlWithFile" accept=".srt, .json, .ass, .sup, .html" multiple style="display:none;" />
                <div class="inline-options-container">
                    <label for="toggleCaptionDisplay">显示字幕</label>
                    <input type="checkbox" id="toggleCaptionDisplay" />
                    <label for="toggleCaptionBackgroundColor">字幕黑色背景</label>
                    <input type="checkbox" id="toggleCaptionBackgroundColor" />
                    <label for="toggleCaptionShadow">字幕描边</label>
                    <input type="checkbox" id="toggleCaptionShadow" />
                    <div class="inline-block-element">
                        <label for="scaleSupCaption">sup缩放:</label>
                        <input type="number" id="scaleSupCaption" value="1.0" step="0.1">
                    </div>
                    <div class="inline-block-element">
                        <label for="sideListSupHeight">sup侧边高度:</label>
                        <input type="number" id="sideListSupHeight" value="28">
                    </div>
                </div>
                <div class="inline-block-element">
                    <span class="dufs-url-history-wrapper">
                        <input type="text" id="dufsUrl" placeholder='dufs目录路径(结尾不用加"?simple")' autocomplete="off">
                        <div id="dufsUrlHistoryList" class="dufs-url-history-list"></div>
                    </span>
                    <button id="fetchDufsFiles">获取Dufs列表</button>
                </div>
                <div class="inline-block-element">
                    <label for="toggleSubtileShade">字幕遮罩器</label>
                    <input type="checkbox" id="toggleSubtileShade" />
                </div>
                <div class="inline-block-element">
                    <label for="blurAllSub">模糊侧边字幕</label>
                    <input type="checkbox" id="blurAllSub" />
                </div>

    <script>
        // ASS to SRT 转换 - 使用动态 Format 解析
        // 辅助函数：解析 Format 行，获取字段索引
        function parseFormatLine(lines) {
            var inEventsSection = false;
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                
                // 检测进入 [Events] 部分
                if (line === '[Events]') {
                    inEventsSection = true;
                    continue;
                }
                
                // 检测离开 [Events] 部分（遇到其他 [xxx] 部分）
                if (line.startsWith('[') && inEventsSection) {
                    break; // 已经离开 Events 部分，停止搜索
                }
                
                // 只在 Events 部分内查找 Format 行
                if (inEventsSection && line.startsWith('Format:')) {
                    var fields = line.substring(7).split(',').map(function(f) {
                        return f.trim();
                    });
                    return {
                        fields: fields,
                        startIdx: fields.indexOf('Start'),
                        endIdx: fields.indexOf('End'),
                        textIdx: fields.indexOf('Text'),
                        styleIdx: fields.indexOf('Style'),
                        actorIdx: fields.indexOf('Name')
                    };
                }
            }
            
            return null; // 在 Events 部分中未找到 Format 行
        }
        
        // 辅助函数：解析 Dialogue 行，提取字幕信息
        function parseDialogueLine(line, formatInfo) {
            // 去掉 "Dialogue:" 前缀
            var content = line.substring(9);
            
            // 找到 Text 字段开始的位置（第 textIdx 个逗号之后）
            var commaCount = 0;
            var textStartPos = 0;
            for (var i = 0; i < content.length; i++) {
                if (content[i] === ',') {
                    commaCount++;
                    if (commaCount === formatInfo.textIdx) {
                        textStartPos = i + 1;  // 跳过逗号本身
                        break;
                    }
                }
            }
            
            // 直接提取 Text 字段（从 textStartPos 到结尾）
            var text = content.substring(textStartPos);
            
            // 提取 Text 之前的部分，用逗号切分获取其他字段
            var beforeText = content.substring(0, textStartPos - 1);
            var parts = beforeText.split(',');
            
            return {
                start: formatInfo.startIdx < parts.length ? parts[formatInfo.startIdx] : '',
                end: formatInfo.endIdx < parts.length ? parts[formatInfo.endIdx] : '',
                text: text,
                style: formatInfo.styleIdx >= 0 && formatInfo.styleIdx < parts.length ? parts[formatInfo.styleIdx] : '',
                actor: formatInfo.actorIdx >= 0 && formatInfo.actorIdx < parts.length ? parts[formatInfo.actorIdx] : ''
            };
        }
        
        // 辅助函数：清理字幕文本（去除样式标签、换行符）
        function cleanText(text) {
            // 去除样式标签 {xxx}
            text = text.replace(/\{[^}]+\}/g, '');
            // 将 \N 替换为换行符
            text = text.replace(/\\N/gi, '\n');
            return text.trim();
        }
        
        // 辅助函数：灵活解析 ASS 时间格式
        function parseAssTime(assTime) {
            // 支持 H:MM:SS.CC 或 H:MM:SS.CCC 格式
            var parts = assTime.split(':');
            var h = parseInt(parts[0], 10) || 0;
            var m = parseInt(parts[1], 10) || 0;
            
            // 处理秒和毫秒
            var secParts = parts[2].split('.');
            var s = parseInt(secParts[0], 10) || 0;
            var msStr = secParts[1] || '0';
            // 补齐到3位
            while (msStr.length < 3) {
                msStr += '0';
            }
            var ms = parseInt(msStr, 10) || 0;
            
            return h * 3600 + m * 60 + s + ms / 1000;
        }
        
        // 辅助函数：将 ASS 时间转换为 SRT 时间格式
        function assTimeToSrtTime(assTime) {
            var h = '00', m = '00', s = '00', ms = '000';
            var t = assTime.split(':');
            if (t.length > 0) {
                h = t[0].length == 1 ? '0' + t[0] : t[0];
            }
            if (t.length > 1) {
                m = t[1].length == 1 ? '0' + t[1] : t[1];
            }
            if (t.length > 2) {
                var t2 = t[2].split('.');
                if (t2.length > 0) {
                    s = t2[0].length == 1 ? '0' + t2[0] : t2[0];
                }
                if (t2.length > 0) {
                    ms = t2[1].length == 2 ? t2[1] + '0' : (t2[1].length == 1 ? t2[1] + '00' : t2[1]);
                }
            }
            return [h, m, s + ',' + ms].join(':');
        }
        
        // 主函数：ASS 转 SRT
        function ass2srt(assText) {
            var lines = String(assText).split(/\r*\n/);
            
            // 步骤 1: 解析 Format 行
            var formatInfo = parseFormatLine(lines);
            if (!formatInfo) {
                console.warn('No Format line found in ASS file, using default format');
                // 使用默认格式
                formatInfo = {
                    fields: ['Layer', 'Start', 'End', 'Style', 'Name', 'MarginL', 'MarginR', 'MarginV', 'Effect', 'Text'],
                    startIdx: 1,
                    endIdx: 2,
                    textIdx: 9,
                    styleIdx: 3,
                    actorIdx: 4
                };
            }
            
            // 步骤 2: 解析所有 Dialogue 行
            var srts = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                
                // 只处理 Dialogue 行，忽略 Comment 行和其他行
                if (!line.startsWith('Dialogue:')) {
                    continue;
                }
                
                var subtitle = parseDialogueLine(line, formatInfo);
                if (subtitle.start && subtitle.end && subtitle.text) {
                    var text = cleanText(subtitle.text);
                    srts.push({
                        start: subtitle.start,
                        end: subtitle.end,
                        text: text
                    });
                }
            }
            
            // 步骤 3: 排序并转换为 SRT 格式
            var i = 1;
            var output = srts.sort(function(d1, d2) {
                var s1 = parseAssTime(d1.start);
                var s2 = parseAssTime(d2.start);
                var e1 = parseAssTime(d1.end);
                var e2 = parseAssTime(d2.end);
                
                return s1 != s2 ? s1 - s2 : e1 - e2;
            }).map(function(srt) {
                var start = assTimeToSrtTime(srt.start);
                var end = assTimeToSrtTime(srt.end);
                return (i++) + '\n'
                    + start + ' --> ' + end + '\n'
                    + srt.text + '\n\n';
            }).join('');
            
            return output;
        }
        
        // 暴露到全局
        window.ass2srt = ass2srt;
    </script>
    <script>
        var isResizing = false;
        var isResizingVertically = false;

        var layoutOrientation = 'landscape';

        function inferInitialLayoutOrientation() {
            return window.innerHeight > window.innerWidth * 1.05 ? 'portrait' : 'landscape';
        }

        function getLayoutContainer() {
            return $('#container');
        }

        function isPortraitLayout() {
            return layoutOrientation === 'portrait';
        }

        function setSubtitleAreaWidthPercent(percent) {
            var safePercent = Math.max(20, Math.min(80, percent));
            var variableName = isPortraitLayout() ? '--portrait-subtitles-width' : '--landscape-subtitles-width';
            getLayoutContainer()[0].style.setProperty(variableName, safePercent + '%');
        }

        function placeVideoMeta() {
            var meta = document.getElementById('videoFileNameContainer');
            var target = document.getElementById('video-meta-video-slot');
            if (meta && target && meta.parentElement !== target) {
                target.appendChild(meta);
            }
        }

        function refreshLayout() {
            var container = getLayoutContainer();
            var reversed = $('#toggleLayout').prop('checked');
            container.toggleClass('layout-landscape', !isPortraitLayout());
            container.toggleClass('layout-portrait', isPortraitLayout());
            container.toggleClass('layout-reversed', reversed);
            placeVideoMeta();

            $('#layoutOrientationLandscape').prop('checked', !isPortraitLayout());
            $('#layoutOrientationPortrait').prop('checked', isPortraitLayout());

            $('#subtitles').css('width', '');
            $('#video-player').css('width', '');
        }

        function setLayoutOrientation(orientation) {
            layoutOrientation = orientation === 'portrait' ? 'portrait' : 'landscape';
            refreshLayout();
        }

        // 通过拖动水平分割线调整视频高度
        $(function () {
            var video = $('#video');

            setLayoutOrientation(inferInitialLayoutOrientation());

            $('input[name="layoutOrientation"]').change(function () {
                setLayoutOrientation(this.value);
            });

            $('#toggleLayout').change(function () {
                refreshLayout();
            });

            var needInitAudioCtx = true;
            var gainNode = null;
            $('#mediaGain').on('input', () => {
                if (needInitAudioCtx) {
                    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    gainNode = audioCtx.createGain();
                    var mediaElementSource = audioCtx.createMediaElementSource(document.getElementById("video"));
                    mediaElementSource.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    needInitAudioCtx = false;
                }
                gainNode.gain.value = parseInt(document.getElementById("mediaGain").value, 10);
            });

            const hideControlsStyle = document.createElement('style');
            hideControlsStyle.innerHTML = `
                video::-webkit-media-controls-panel {
                    display: none !important;
                }
                video::-webkit-media-controls-play-button {
                    display: none !important;
                }
            `;

            video.on('mouseenter', function () {
                var hideControl = $('#hideControl').prop('checked');
                if (document.head.contains(hideControlsStyle) && !hideControl) {
                    document.head.removeChild(hideControlsStyle);

            video.on('mouseleave', function () {
                if (video.prop('readyState') == 4) {
                    document.head.appendChild(hideControlsStyle);

                }

            $('#toggleSubtileShade').change(function () {

            var horizontalDivider = $('#horizontal-divider');

                if (isPortraitLayout()) return;

                isResizingVertically = true;

            $(document).on('mousemove', function (e) {
                if (!isResizingVertically || isPortraitLayout()) return;

                var y = e.clientY;

                video.css('height', videoHeight + 'px');

        // 通过拖动垂直分割线调整视频和字幕区域的水平比例

            function extractFilename(urlString) {

            function getSubtitleDisplayName(fileLike, fallbackName) {
                if (fileLike && typeof fileLike.name === 'string' && fileLike.name) {
                    return fileLike.name;
                }
                if (typeof fallbackName === 'string' && fallbackName) {
                    return fallbackName;

            function isRefreshableLocalSrtLoaded() {

            function updateRefreshCurrentSubtitleButtonState() {
                var button = document.getElementById('refreshCurrentSubtitle');
                if (!button) {
                    return;
                }

                var hasRefreshableLocalSrt = isRefreshableLocalSrtLoaded();
                button.disabled = !hasRefreshableLocalSrt || isRefreshingCurrentSubtitle;
                button.textContent = isRefreshingCurrentSubtitle ? '刷新中...' : '刷新当前字幕';

                if (!hasRefreshableLocalSrt) {
                    button.title = '仅在当前已加载本地 SRT 时可用';
                } else if (currentSrtRefreshHandle) {
                    button.title = '重新读取磁盘上的当前 SRT 文件';
