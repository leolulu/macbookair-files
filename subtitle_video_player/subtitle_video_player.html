                    button.title = '首次刷新需要重新选择一次当前 SRT 文件';
                }
            }

            function setCurrentSubtitleContext(kind, fileLike, options) {
                options = options || {};
                currentSubtitleKind = kind || 'none';
                currentSubtitleFileName = getSubtitleDisplayName(fileLike, options.fallbackName);

                if (currentSubtitleKind !== 'local-srt' || options.keepRefreshHandle !== true) {
                    currentSrtRefreshHandle = null;
                }

                updateRefreshCurrentSubtitleButtonState();
            }

            async function bindCurrentSrtRefreshHandle() {
                if (!window.isSecureContext || typeof window.showOpenFilePicker !== 'function') {
                    throw new Error('当前环境不支持刷新当前字幕');
                }

                var handles = await window.showOpenFilePicker({
                    id: 'subtitle-video-player-refresh-srt',
                    multiple: false,
                    excludeAcceptAllOption: true,
                    types: [{
                        description: 'SRT 字幕',
                        accept: {
                            'text/plain': ['.srt']
                        }
                    }]
                });

                if (!handles || handles.length === 0) {
                    return null;
                }

                return handles[0];
            }

            async function refreshCurrentSubtitle() {
                if (!isRefreshableLocalSrtLoaded() || isRefreshingCurrentSubtitle) {
                    return;
                }

                isRefreshingCurrentSubtitle = true;
                updateRefreshCurrentSubtitleButtonState();

                try {
                    var isFirstBind = currentSrtRefreshHandle === null;
                    var handle = currentSrtRefreshHandle;

                    if (!handle) {
                        handle = await bindCurrentSrtRefreshHandle();
                        if (!handle) {
                            return;
                        }
                        currentSrtRefreshHandle = handle;
                    }

                    var file = await handle.getFile();
                    var fileName = getSubtitleDisplayName(file, currentSubtitleFileName);

                    if (!fileName || !fileName.toLowerCase().endsWith('.srt')) {
                        currentSrtRefreshHandle = null;
                        showFloatingToast('请选择 SRT 字幕文件', 'error', 2200);
                        return;
                    }

                    srtLoaded = true;
                    await loadSubtitles(file);
                    setCurrentSubtitleContext('local-srt', file, { keepRefreshHandle: true });
                    showFloatingToast(isFirstBind ? '已绑定并刷新当前字幕' : '已刷新当前字幕', 'success', 1800);
                    requestVideoFocusReturn();
                } catch (error) {
                    if (error && error.name === 'AbortError') {
                        return;
                    }

                    currentSrtRefreshHandle = null;
                    updateRefreshCurrentSubtitleButtonState();
                    console.error('Refresh current subtitle failed:', error);
                    showFloatingToast('刷新失败，请重新选择当前 SRT', 'error', 2600);
                } finally {
                    isRefreshingCurrentSubtitle = false;
                    updateRefreshCurrentSubtitleButtonState();
                }
            }

            function roundSubtitleSyncOffset(value) {
                return Math.round(value * 10) / 10;
            }

            function getSubtitleTimelineTime(videoTime) {
                return accTime(videoTime - subtitleSyncOffset);
            }

            function getShiftedSubtitleTime(subtitleTime) {
                return accTime(Math.max(0, subtitleTime + subtitleSyncOffset));
            }

            function formatSubtitleSyncStatus() {
                if (subtitleSyncOffset === 0) {
                    return '字幕Offset: 0.0s';
                }
                if (subtitleSyncOffset < 0) {
                    return '字幕Offset: 超前 ' + Math.abs(subtitleSyncOffset).toFixed(1) + 's';
                }
                return '字幕Offset: 滞后 ' + subtitleSyncOffset.toFixed(1) + 's';
            }

            function updateSubtitleSyncStatus() {
                var status = document.getElementById('subtitleSyncStatus');
                if (status) {
                    status.textContent = formatSubtitleSyncStatus();
                    status.title = '显示当前字幕Offset；超前=字幕更早出现，滞后=字幕更晚出现。当前：' + formatSubtitleSyncStatus();
                }
            }

            function adjustSubtitleSyncOffset(delta) {
                subtitleSyncOffset = roundSubtitleSyncOffset(subtitleSyncOffset + delta);
                updateSubtitleSyncStatus();
                if (subtitleSyncOffset === 0) {
                    showFloatingToast('字幕同步已复位到 0.0s', 'success', 1800);
                } else if (subtitleSyncOffset < 0) {
                    showFloatingToast('字幕已超前 ' + Math.abs(subtitleSyncOffset).toFixed(1) + 's', 'info', 1800);
                } else {
                    showFloatingToast('字幕已滞后 ' + subtitleSyncOffset.toFixed(1) + 's', 'info', 1800);
                }
                updatePlayerState();
                $('#video')[0].focus();
            }

            function svpSupLog(event, details) {
                try {
                    var msg = '[SVP_SUP] ' + event;
                    if (details !== undefined) {
                        console.log(msg, details);
                    } else {
                        console.log(msg);
                    }
                } catch {
                }
            }

            function setCurrentMovieCacheIdFromFile(file, sourceIdOverride) {
                currentMovieCacheId = window.SupOcrCache.makeMovieId(file, sourceIdOverride);
                svpSupLog('setCurrentMovieCacheId', { currentMovieCacheId: currentMovieCacheId });
            }

            function getCurrentMovieCacheId() {
                return currentMovieCacheId || 'no-movie';
            }

            function buildSupPendingText(index, total) {
                return '[SUP OCR 待处理 ' + (index + 1) + '/' + total + ']';
            }

            function buildSupFailedText(index, total, attemptsUsed) {
                const attemptText = attemptsUsed && attemptsUsed > 0 ? ('，已重试 ' + attemptsUsed + ' 次') : '';
                return '[SUP OCR 本轮未识别 ' + (index + 1) + '/' + total + attemptText + '，刷新可重试]';
            }

            function waitForVideoReadyForOcr(timeoutMs) {
                timeoutMs = typeof timeoutMs === 'number' ? timeoutMs : 15000;
                const video = document.getElementById('video');
                if (!video || !video.currentSrc) {
                    return Promise.resolve({ reason: 'no-video', readyState: video ? video.readyState : null });
                }
                if (video.readyState >= 1) {
                    return Promise.resolve({ reason: 'already-ready', readyState: video.readyState });
                }

                return new Promise((resolve) => {
                    let done = false;
                    let timer = null;

                    function finish(reason) {
                        if (done) {
                            return;
                        }
                        done = true;
                        if (timer) {
                            clearTimeout(timer);
                        }
                        video.removeEventListener('loadedmetadata', onLoadedMetadata);
                        video.removeEventListener('canplay', onCanPlay);
                        video.removeEventListener('error', onError);
                        resolve({ reason: reason, readyState: video.readyState });
                    }

                    function onLoadedMetadata() {
                        finish('loadedmetadata');
                    }

                    function onCanPlay() {
                        finish('canplay');
                    }

                    function onError() {
                        finish('video-error');
                    }

                    timer = setTimeout(function () {
                        finish('timeout');
                    }, timeoutMs);

                    video.addEventListener('loadedmetadata', onLoadedMetadata);
                    video.addEventListener('canplay', onCanPlay);
                    video.addEventListener('error', onError);
                });
            }

            function yieldToMainThread(timeoutMs) {
                timeoutMs = typeof timeoutMs === 'number' ? timeoutMs : 16;
                return new Promise(function (resolve) {
                    var done = false;
                    function finish() {
                        if (done) {
                            return;
                        }
                        done = true;
                        resolve();
                    }
                    if (typeof requestAnimationFrame === 'function') {
                        requestAnimationFrame(finish);
                    }
                    setTimeout(finish, timeoutMs);
                });
            }

            function flushSupSubtitleDomBatch(queue, limit) {
                limit = typeof limit === 'number' ? limit : 100;
                for (var i = 0; i < limit && queue.length > 0; i++) {
                    var update = queue.shift();
                    var subtitleDiv = document.querySelector('.subtitle[data-index="' + update.index + '"]');
                    if (subtitleDiv) {
                        subtitleDiv.textContent = update.text;
                    }
                }
            }

            function bindSupSubtitleClickHandler() {
                var container = document.getElementById('subtitles');
                if (!container || container.getAttribute('data-sup-click-bound') === '1') {
                    return;
                }
                container.setAttribute('data-sup-click-bound', '1');
                container.addEventListener('click', function (event) {
                    var subtitleDiv = event.target && event.target.closest ? event.target.closest('.subtitle') : null;
                    if (!subtitleDiv || !container.contains(subtitleDiv)) {
                        return;
                    }
                    var index = parseInt(subtitleDiv.getAttribute('data-index'), 10);
                    if (!Number.isFinite(index) || !subtitles[index]) {
                        return;
                    }
                    playerState.skipCalibrationBySubClick = true;
                    $('#video')[0].currentTime = getShiftedSubtitleTime(subtitles[index].start);
                    if ($('#clickToPlay').prop('checked')) {
                        $('#video')[0].play();
                    }
                    $('#video')[0].focus();
                });
            }

            function removeFloatingToastByKey(key) {
                var toast = document.querySelector('#toastContainer .floating-toast[data-toast-key="' + key + '"]');
                if (!toast) {
                    return;
                }
                toast.classList.remove('show');
                setTimeout(function () {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 220);
                if (toastTimers[key]) {
                    clearTimeout(toastTimers[key]);
                    delete toastTimers[key];
                }
            }

            function upsertFloatingToast(key, message, type, durationMs) {
                var container = document.getElementById('toastContainer');
                if (!container) {
                    return;
                }
                var toast = document.querySelector('#toastContainer .floating-toast[data-toast-key="' + key + '"]');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.className = 'floating-toast';
                    toast.setAttribute('data-toast-key', key);
                    container.appendChild(toast);
                }
                toast.className = 'floating-toast toast-' + (type || 'info');
                toast.textContent = message;

                requestAnimationFrame(function () {
                    toast.classList.add('show');
                });

                if (toastTimers[key]) {
                    clearTimeout(toastTimers[key]);
                    delete toastTimers[key];
                }

                if (durationMs !== 0) {
                    var stay = typeof durationMs === 'number' ? durationMs : 2600;
                    toastTimers[key] = setTimeout(function () {
                        removeFloatingToastByKey(key);
                    }, stay);
                }
            }

            function showFloatingToast(message, type, durationMs) {
                upsertFloatingToast('toast-' + Date.now() + '-' + Math.random().toString(16).slice(2), message, type, durationMs);
            }

            function showStatusToast(message, type, durationMs) {
                upsertFloatingToast('ocr-status', message, type, durationMs);
                svpSupLog('statusToast', { message: message, type: type, durationMs: durationMs });
            }

            window.showFloatingToast = showFloatingToast;
            window.showStatusToast = showStatusToast;
            if (window.PaddleSubtitleOcr && typeof window.PaddleSubtitleOcr.setStatusNotifier === 'function') {
                window.PaddleSubtitleOcr.setStatusNotifier(showStatusToast);
            }

            function clearAllSub() {
                var bigDiv = $('#subtitles')[0]
                while (bigDiv.firstChild) {
                    bigDiv.removeChild(bigDiv.firstChild);
                }
            }

            function accTime(num) {
                return parseFloat(num.toFixed(3));
            }

            function isVideoLikeName(name) {
                var lower = String(name || '').toLowerCase();
                return lower.endsWith('.mp4') || lower.endsWith('.webm');
            }

            function sortFilesVideoFirst(files) {
                return Array.from(files).sort(function (a, b) {
                    var av = isVideoLikeName(a && a.name ? a.name : a);
                    var bv = isVideoLikeName(b && b.name ? b.name : b);
                    if (av === bv) {
                        return 0;
                    }
                    return av ? -1 : 1;
                });
            }

            async function processFilesImpl(files) {
                var orderedFiles = sortFilesVideoFirst(files);
                svpSupLog('processFilesImpl ordered', { names: orderedFiles.map(function (f) { return f.name; }) });
                for (var i = 0; i < orderedFiles.length; i++) {
                    if (orderedFiles[i].name.toLowerCase().endsWith('.mp4') || orderedFiles[i].name.toLowerCase().endsWith('.webm')) {
                        var url = URL.createObjectURL(orderedFiles[i]);
                        $('#video').attr('src', url);
                        document.title = orderedFiles[i].name;
                        setCurrentMovieCacheIdFromFile(orderedFiles[i], orderedFiles[i].name);
                        // 更新视频文件名
                        $('#videoFileName').text(orderedFiles[i].name);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.ass')) {
                        srtLoaded = true
                        await loadSubtitles(orderedFiles[i], formatIsAss = true);
                        setCurrentSubtitleContext('ass', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.srt')) {
                        srtLoaded = true
                        await loadSubtitles(orderedFiles[i]);
                        setCurrentSubtitleContext('local-srt', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.json')) {
                        if (!srtLoaded) {
                            await loadSubtitlesFromJSON(orderedFiles[i]);
                            setCurrentSubtitleContext('json', orderedFiles[i]);
                        }
                        loadDiarizationInfo(orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.html')) {
                        await loadSupFromHtml(orderedFiles[i])
                        setCurrentSubtitleContext('sup-html', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.sup')) {
                        await loadSupFromSup(orderedFiles[i], orderedFiles[i].name)
                        setCurrentSubtitleContext('sup', orderedFiles[i]);
                    }
                }
            }

            function processFiles(e) {
                srtLoaded = false;
                let files = e.target.files;
                processFilesImpl(files);
            }

            // Set up event listener for video file input
            $('#videoFile').change(processFiles);
            $('#VideoUrlWithFile').change(processFiles);

            function loadSupFromHtml(file) {
                return new Promise((resolve, reject) => {
                    clearAllSub()
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        const htmlContent = e.target.result;

                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlContent, 'text/html');

                        const divs = doc.querySelectorAll('body > div');
                        tempSubtitles = [];

                        divs.forEach(div => {
                            // 获取div内部的文本，即时间和#号开头的文本
                            const text = div.previousSibling.textContent.trim();
                            // 使用正则表达式匹配时间和图片源
                            const match = text.match(/#(\d+):((\d+):)?(\d+):(\d+),(\d+)->((\d+):)?(\d+):(\d+),(\d+)/);
                            const imgSrc = div.querySelector('img').src.split('/').pop()

                            if (match) {
                                // 转换时间为秒
                                const startTime = (parseInt(match[3] || 0) * 3600) + (parseInt(match[4]) * 60) + parseInt(match[5]) + parseInt(match[6]) / 1000;
                                const endTime = (parseInt(match[8] || 0) * 3600) + (parseInt(match[9]) * 60) + parseInt(match[10]) + parseInt(match[11]) / 1000;
                                // 添加到结果列表
                                tempSubtitles.push({
                                    start: accTime(startTime),
                                    end: accTime(endTime),
                                    text: "<img class='sup-subtitle-image' src='sup/" + imgSrc + "' />"
                                });
                            }
                        });

                        loadSubtitlesImpl()
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            function loadSupFromSup(file, sourceIdOverride) {
                return new Promise((resolve, reject) => {
                    clearAllSub();

                    var runId = ++supRunSeq;
                    svpSupLog('loadSupFromSup start', {
                        runId: runId,
                        sourceIdOverride: sourceIdOverride,
                        fileName: file && file.name ? file.name : null,
                        fileSize: file && typeof file.size === 'number' ? file.size : null,
                        fileLastModified: file && typeof file.lastModified === 'number' ? file.lastModified : null,
                        movieId: getCurrentMovieCacheId(),
                    });

                    const supId = window.SupOcrCache.makeSupId(file, sourceIdOverride);
                    const movieId = getCurrentMovieCacheId();
                    const cacheKey = window.SupOcrCache.makeCacheKey(movieId, supId);

                    svpSupLog('loadSupFromSup cacheKey', { runId: runId, supId: supId, movieId: movieId, cacheKey: cacheKey });

                    // Fast path: fully converted result exists.
                    window.SupOcrCache.get(cacheKey).then(async (cached) => {
                        svpSupLog('loadSupFromSup cache lookup result', {
                            runId: runId,
                            hasCached: !!cached,
                            status: cached ? cached.status : null,
                            cues: cached && cached.cues ? cached.cues.length : null,
                            doneCount: cached && typeof cached.doneCount === 'number' ? cached.doneCount : null,
                        });
                        if (cached && cached.status === 'complete' && Array.isArray(cached.cues) && cached.cues.length > 0) {
                            showFloatingToast('已从缓存恢复 SUP 转换结果', 'success');
                            tempSubtitles = cached.cues.map((c) => ({
                                start: c.start,
                                end: c.end,
                                text: c.text,
                            }));
                            await loadSupSubtitlesImpl();
                            svpSupLog('loadSupFromSup cache hit complete - restored', { runId: runId, count: tempSubtitles.length });
                            resolve();
                            return;
                        }

                        // Partial/no cache: parse SUP to get timing + bitmaps for missing OCR.
                        const reader = new FileReader();
                        reader.onload = async function (e) {
                            try {
                                const tParse0 = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                                const arrayBuffer = e.target.result;
                                const cues = await window.SupPgsParser.parseSupPgsToCues(arrayBuffer);
                                const tParse1 = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                                svpSupLog('loadSupFromSup parsed cues', { runId: runId, cueCount: cues.length, elapsedMs: (tParse1 - tParse0) });

                                // Initialize or validate cache shape.
                                let cacheEntry = cached;
                                if (!window.SupOcrCache.isUsableEntry(cacheEntry, cues.length)) {
                                    svpSupLog('loadSupFromSup initializing new cache entry', { runId: runId });
                                    cacheEntry = window.SupOcrCache.createEntry({
                                        key: cacheKey,
                                        supId,
                                        movieId,
                                        cues: cues.map((c) => ({ start: c.start, end: c.end, text: '' })),
                                    });
                                    await window.SupOcrCache.put(cacheEntry);
                                    svpSupLog('loadSupFromSup cache entry created', { runId: runId, cueCount: cacheEntry.cues.length });
                                }

                                // Build subtitles; use cached text when available, otherwise keep DOM lightweight.
                                tempSubtitles = cues.map((cue, idx) => {
                                    const cachedText = (cacheEntry.cues[idx] && cacheEntry.cues[idx].text) ? String(cacheEntry.cues[idx].text) : '';
                                    if (cachedText) {
                                        return {
                                            start: cue.start,
                                            end: cue.end,
                                            text: cachedText,
                                            listText: cachedText,
                                            __ocrSkip: true,
                                            __ocrResolved: true,
                                        };
                                    }
                                    return {
                                        start: cue.start,
                                        end: cue.end,
                                        text: '',
                                        listText: buildSupPendingText(idx, cues.length),
                                        imageRawData: cue.imageRawData,
                                        __ocrResolved: false,
                                    };
                                });

                                let cachedCount = 0;
                                for (let i = 0; i < tempSubtitles.length; i++) {
                                    if (tempSubtitles[i].__ocrSkip === true) {
                                        cachedCount++;
                                    }
                                }

                                if (cachedCount > 0) {
                                    if (cachedCount >= tempSubtitles.length) {
                                        showFloatingToast('字幕结果已全部从缓存恢复', 'success');
                                    } else {
                                        showFloatingToast('已恢复 ' + cachedCount + '/' + tempSubtitles.length + ' 条缓存，继续补全 OCR', 'info', 3200);
                                    }
                                } else {
                                    showFloatingToast('开始转换 SUP 字幕，请稍候', 'info');
                                }

                                svpSupLog('loadSupFromSup prepared subtitles list', { runId: runId, total: tempSubtitles.length, cachedCount: cachedCount });

                                await loadSupSubtitlesImpl();

                                // Persist progress immediately so partial runs can resume next time.
                                let persistTimer = null;
                                let persistInFlight = false;
                                let persistRequested = false;

                                function persistCacheEntry(force) {
                                    if (force === true) {
                                        persistRequested = false;
                                        schedulePersist(0);
                                        return;
                                    }
                                    persistRequested = true;
                                    schedulePersist(400);
                                }

                                function schedulePersist(delayMs) {
                                    if (persistTimer) {
                                        clearTimeout(persistTimer);
                                    }
                                    persistTimer = setTimeout(function () {
                                        persistTimer = null;
                                        if (persistInFlight) {
                                            persistRequested = true;
                                            schedulePersist(250);
                                            return;
                                        }
                                        if (!persistRequested && delayMs !== 0) {
                                            return;
                                        }
                                        persistInFlight = true;
                                        persistRequested = false;
                                        window.SupOcrCache.put(cacheEntry).catch(function (err) {
                                            console.warn('SUP OCR cache save failed:', err);
                                        }).finally(function () {
                                            persistInFlight = false;
                                            if (persistRequested) {
                                                schedulePersist(250);
                                            }
                                        });
                                        svpSupLog('loadSupFromSup persist cache', { runId: runId, status: cacheEntry.status, doneCount: cacheEntry.doneCount, total: cacheEntry.cues.length });
                                    }, delayMs);
                                }

                                // Ensure doneCount is accurate.
                                let doneCount = 0;
                                let resolvedCount = 0;
                                let failedCount = 0;
                                for (let i = 0; i < cacheEntry.cues.length; i++) {
                                    if (cacheEntry.cues[i] && cacheEntry.cues[i].text) {
                                        doneCount++;
                                        resolvedCount++;
                                    }
                                }

                                setTimeout(async function () {
                                    const waitResult = await waitForVideoReadyForOcr(15000);
                                    svpSupLog('loadSupFromSup video ready gate', { runId: runId, waitResult: waitResult });
                                    if (waitResult.reason !== 'already-ready') {
                                        showFloatingToast('视频已准备，开始 OCR 初始化', 'info', 2200);
                                    }

                                    var pendingDomUpdates = [];
                                    var domFlushScheduled = false;
                                    var ocrFinalized = false;

                                    function scheduleDomFlush(force) {
                                        if (force === true) {
                                            flushSupSubtitleDomBatch(pendingDomUpdates, pendingDomUpdates.length || 1);
                                            domFlushScheduled = false;
                                            return;
                                        }
                                        if (domFlushScheduled) {
                                            return;
                                        }
                                        domFlushScheduled = true;
                                        yieldToMainThread(16).then(function () {
                                            domFlushScheduled = false;
                                            flushSupSubtitleDomBatch(pendingDomUpdates, 100);
                                            if (pendingDomUpdates.length > 0) {
                                                scheduleDomFlush(false);
                                            }
                                        });
                                    }

                                    function finalizeSupOcrRun() {
                                        if (ocrFinalized) {
                                            return;
                                        }
                                        ocrFinalized = true;
                                        scheduleDomFlush(true);
                                        persistCacheEntry(true);
                                        if (failedCount > 0) {
                                            showFloatingToast('SUP OCR 已完成，仍有 ' + failedCount + ' 条未识别；刷新页面可重试', 'warning', 4200);
                                            svpSupLog('loadSupFromSup OCR complete with unresolved items', { runId: runId, total: cacheEntry.cues.length, doneCount: doneCount, resolvedCount: resolvedCount, failedCount: failedCount });
                                        } else {
                                            showFloatingToast('SUP OCR 已完成并写入缓存', 'success');
                                            svpSupLog('loadSupFromSup OCR complete', { runId: runId, total: cacheEntry.cues.length });
                                        }
                                    }

                                    window.PaddleSubtitleOcr.recognizeSupItems(tempSubtitles, ({ index, text, recognized, attemptsUsed }) => {
                                        const subtitleItem = tempSubtitles[index];
                                        if (!subtitleItem) {
                                            return;
                                        }

                                        const isRecognized = recognized !== false && !!text;
                                        const wasResolved = subtitleItem.__ocrResolved === true;
                                        const prev = cacheEntry.cues[index] ? String(cacheEntry.cues[index].text || '') : '';

                                        if (!wasResolved) {
                                            resolvedCount++;
                                        }

                                        if (isRecognized) {
                                            if (!prev) {
                                                doneCount++;
                                            }
                                            cacheEntry.cues[index] = {
                                                start: subtitleItem.start,
                                                end: subtitleItem.end,
                                                text: text,
                                            };
                                            subtitleItem.text = text;
                                            subtitleItem.listText = text;
                                            if (subtitles[index]) {
                                                subtitles[index].text = text;
                                            }
                                            pendingDomUpdates.push({ index: index, text: text });
                                        } else {
                                            if (!wasResolved) {
                                                failedCount++;
                                            }
                                            cacheEntry.cues[index] = {
                                                start: subtitleItem.start,
                                                end: subtitleItem.end,
                                                text: '',
                                            };
                                            subtitleItem.text = '';
                                            subtitleItem.listText = buildSupFailedText(index, cacheEntry.cues.length, attemptsUsed);
                                            if (subtitles[index]) {
                                                subtitles[index].text = '';
                                            }
                                            pendingDomUpdates.push({ index: index, text: subtitleItem.listText });
                                        }

                                        subtitleItem.__ocrResolved = true;
                                        subtitleItem.__ocrSkip = true;
                                        subtitleItem.imageRawData = null;

                                        if (doneCount >= cacheEntry.cues.length) {
                                            cacheEntry.status = 'complete';
                                        } else {
                                            cacheEntry.status = 'partial';
                                        }
                                        cacheEntry.doneCount = doneCount;
                                        persistCacheEntry(false);
                                        scheduleDomFlush(false);

                                        if (resolvedCount >= cacheEntry.cues.length) {
                                            finalizeSupOcrRun();
                                        }
                                    }).then(() => {
                                        if (resolvedCount >= cacheEntry.cues.length) {
                                            finalizeSupOcrRun();
                                        } else {
                                            scheduleDomFlush(true);
                                            persistCacheEntry(true);
                                            showFloatingToast('SUP OCR 本轮结束，仍有 ' + (cacheEntry.cues.length - resolvedCount) + ' 条未完成，刷新页面可重试', 'warning', 4200);
                                            svpSupLog('loadSupFromSup OCR finished with unresolved pending items', { runId: runId, total: cacheEntry.cues.length, doneCount: doneCount, resolvedCount: resolvedCount, failedCount: failedCount });
                                        }
                                    }).catch(err => {
                                        console.error('SUP OCR failed:', err);
                                        cacheEntry.doneCount = doneCount;
                                        scheduleDomFlush(true);
                                        persistCacheEntry(true);
                                        showFloatingToast('SUP OCR 中断，已保存当前进度', 'warning', 3200);
                                        svpSupLog('loadSupFromSup OCR failed', { runId: runId, message: String(err && err.message ? err.message : err), stack: err && err.stack ? String(err.stack) : null });
                                    });
                                }, 0);

                                resolve();
                            } catch (err) {
                                reject(err);
                            }
                        };
                        reader.onerror = reject;
                        reader.readAsArrayBuffer(file);
                    }).catch(reject);
                });
            }

            async function loadSupSubtitlesImpl() {

                bindSupSubtitleClickHandler();

                var subtitlesContainer = document.getElementById('subtitles');
                var batchSize = 200;
                for (let i = 0; i < tempSubtitles.length; i += batchSize) {
                    var fragment = document.createDocumentFragment();
                    var end = Math.min(i + batchSize, tempSubtitles.length);
                    for (let j = i; j < end; j++) {
                        subtitles.push({ start: tempSubtitles[j].start, end: tempSubtitles[j].end, text: tempSubtitles[j].text });
                        var subtitleDiv = document.createElement('div');
                        subtitleDiv.className = 'subtitle';
                        subtitleDiv.setAttribute('data-index', String(j));

                        fragment.appendChild(subtitleDiv);

                    if (end < tempSubtitles.length) {

                    }
                }
                refreshLayout();

            function loadSubtitlesFromJSONImpl(triggeredFromSentenceLength = false) {
                subtitles = [];
                // Combine short subtitles
                var i = 0;
                while (i < tempSubtitles.length) {
                    var sentence_div = document.createElement('div');
                    var sentence_text = tempSubtitles[i].text;
                    var sentence_start = tempSubtitles[i].start;
                    var sentence_end = tempSubtitles[i].end;

                    function appendWords() {
                        var words = tempSubtitles[i].words;
                        words.forEach(function (word) {
                            var word_span = document.createElement('span');
                            word_span.innerText = word.word;
                            word_span.style.cursor = 'pointer';
                            word_span.onclick = function (event) {
                                event.stopPropagation();
                                video.currentTime = getShiftedSubtitleTime(word.start);
                                if ($('#clickToPlay').prop('checked')) {
                                    $('#video')[0].play();
                                }
                                $('#video')[0].focus();
                            };
                            word_span.setAttribute('data-start', accTime(word.start));
                            word_span.setAttribute('data-end', accTime(word.end));
                            word_span.className = 'subtitle-word'
                            sentence_div.appendChild(word_span);
                        });
                    }

                    appendWords()

                    function whileCondition(i) {
                        if (triggeredFromSentenceLength) {
                            let minLength = parseInt(document.getElementById("textLength").value, 10);
                            return sentence_text.length < minLength
                        } else {
                            let checked = $('#enableTimeConcat').prop('checked')
                            let adjacent = tempSubtitles[i + 1].start - sentence_end < parseFloat(document.getElementById('timeConcat').value)
                            return checked && adjacent
                        }
                    }

                    while (i + 1 < tempSubtitles.length && whileCondition(i)) {
                        i++;
                        sentence_text += "，" + tempSubtitles[i].text;
                        sentence_end = tempSubtitles[i].end;
                        let span = document.createElement('span');
                        span.textContent = "，";
                        (function (currentI) {
                            span.onclick = function (event) {
                                event.stopPropagation();
                                video.currentTime = getShiftedSubtitleTime(tempSubtitles[currentI].start);
                                if ($('#clickToPlay').prop('checked')) {
                                    $('#video')[0].play();
                                }
                                $('#video')[0].focus();
                            };
                        })(i)
                        sentence_div.append(span);
                        appendWords()
                    }
                    subtitles.push({ start: sentence_start, end: sentence_end, text: sentence_text });
                    sentence_div.className = 'subtitle';
                    sentence_div.setAttribute('data-index', subtitles.length - 1);
                    sentence_div.setAttribute('data-sentence-start', sentence_start);
                    sentence_div.setAttribute('data-sentence-end', sentence_end);

                    var transparent_sentence_div = document.createElement('div');
                    transparent_sentence_div.textContent = sentence_text;
                    transparent_sentence_div.className = 'transparent-sentence';
                    sentence_div.append(transparent_sentence_div);

                    $('#subtitles').append(sentence_div)
                    i++;
                }
                // Set up event listener for clicking on subtitles
                $('.subtitle').click(function () {
                    var index = $(this).data('index');
                    $('#video')[0].currentTime = getShiftedSubtitleTime(subtitles[index].start);
                    if ($('#clickToPlay').prop('checked')) {
                        $('#video')[0].play();
                    }
                    $('#video')[0].focus();
                });
                refreshLayout();
            }

                const reader = new FileReader();
                reader.onload = function (event) {
                    const data = JSON.parse(event.target.result);

                    const labelHeights = {};
                    const heightIncrement = 100 / labels.length;
                    labels.forEach((label, index) => {
                        labelHeights[label] = index * heightIncrement;

                    // Process the data

            function visualizeSpeakers(diarizationInfo, labelHeights, heightIncrement, labels, videoDuration) {
                const video = document.getElementById('video');
                const speakerContainerParent = document.getElementById('options-pane') || document.getElementById('video-player');

                const existingContainer = document.getElementById('speaker-container');
                if (existingContainer) {
                    existingContainer.parentElement.removeChild(existingContainer);
                }

                const container = document.createElement('div');
                container.id = 'speaker-container';  // Assigning an ID to the container for easy reference
                container.style.border = '1px solid #aaa';
                let speakerCount = Object.keys(labelHeights).length;
                let speakerDivHeight = speakerCount <= 4 ? 40 : (speakerCount <= 8 ? 30 : (speakerCount <= 16 ? 20 : 10));
                container.style.height = (speakerCount * speakerDivHeight) + 'px'; // Adjust height based on number of speakers
                container.style.position = 'relative';
                container.style.marginTop = '10px';
                container.style.overflow = 'hidden';

                // Define a set of colors
                const colors = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00', '#ffff33', '#a65628', '#f781bf'];

                diarizationInfo.forEach(info => {
                    const speakerDiv = document.createElement('div');
                    const startPercentage = (info.start / videoDuration) * 100;
                    const endPercentage = (info.end / videoDuration) * 100;

                    speakerDiv.style.position = 'absolute';
                    speakerDiv.style.top = labelHeights[info.label] + '%';
                    speakerDiv.style.height = heightIncrement + '%';
                    speakerDiv.style.left = startPercentage + '%';
                    speakerDiv.style.width = (endPercentage - startPercentage) + '%';
                    speakerDiv.style.background = colors[labels.indexOf(info.label) % colors.length];
                    speakerDiv.title = info.label;

                    container.appendChild(speakerDiv);
                });

                // Create and add the progress line to the container
                const progressLine = document.createElement('div');
                progressLine.style.position = 'absolute';
                progressLine.style.top = '0';
                progressLine.style.bottom = '0';
                progressLine.style.width = '1px';
                progressLine.style.background = '#000000';  // Color of the progress line
                container.appendChild(progressLine);

                // Update the position of the progress line based on the video's current time
                video.addEventListener('timeupdate', function () {
                    const progressPercentage = (video.currentTime / videoDuration) * 100;
                    progressLine.style.left = progressPercentage + '%';
                });

                // Jump to the clicked position in the video
                container.addEventListener('click', function (event) {
                    let clickPosition = event.offsetX;
                    // Adjust the click position if the target is a speakerDiv
                    if (event.target !== container) {
                        clickPosition += event.target.offsetLeft;
                    }
                    const containerWidth = container.offsetWidth;
                    const clickedPercentage = (clickPosition / containerWidth);
                    video.currentTime = clickedPercentage * videoDuration;
                    $('#video')[0].focus();
                });

                speakerContainerParent.appendChild(container);

            }
