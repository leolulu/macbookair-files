<!DOCTYPE html>
<html>

<head>
    <title>Video Player with Subtitles</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="assets/vendor/jquery/jquery-ui-1.13.2.css">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #container {
            display: flex;
            height: 100vh;
        }

        .container-layout-normal {
            flex-direction: row;
        }

        .container-layout-reversed {
            flex-direction: row-reverse;
        }

        #video-player {
            width: 66%;
            overflow: auto;
            align-self: flex-start;
        }

        .video-layout-normal {
            margin-left: 0px;
        }

        .video-layout-reversed {
            margin-left: -4px;
        }

        #video {
            width: 100%;
            display: block;
        }

        #divider {
            cursor: col-resize;
            border-left: 1px solid #aaa;
            width: 4px;
            z-index: 2;
        }

        #subtitles {
            width: 33%;
            overflow: auto;
            height: 99.9vh;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 600;
        }

        .subtitle {
            cursor: pointer;
            padding-top: 2px;
            padding-bottom: 3px;
            border-bottom: 1px dashed #d1c4c4;
            font-size: 18px;
            font-family: PingFang SC, Hiragino Sans GB, Microsoft Yahei, Arial, sans-serif;
            position: relative;
            border-right: 10px solid transparent;
            line-height: 28px;
        }

        .subtitle:nth-child(even) {
            color: #C2571A;
        }

        .subtitle:nth-child(odd) {
            color: #107896;
        }

        .subtitle:hover {
            color: #7b1fa2;
            border-right: 10px solid #E0E0E0;
        }

        .subtitle-word.highlight {
            color: #FFFFFF;
            background-color: #336DF4;
        }

        .subtitle.highlight {
            border-right: 10px solid red;
            background-image: url('data:image/png;base64, iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsIAAA7CARUoSoAAAAANSURBVBhXY3j58uV/AAk1A7vMebz/AAAAAElFTkSuQmCC');
        }

        .transparent-sentence {
            color: transparent;
            position: absolute;
            left: 0;
            top: 2px;
            pointer-events: none;
            user-select: none;
        }

        #videoFileNameContainer {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            margin: 10px;
            font-weight: 800;

        }

        #videoDurationInfo {

    <script>
        // ASS to SRT 转换 - 使用动态 Format 解析
        // 辅助函数：解析 Format 行，获取字段索引
        function parseFormatLine(lines) {
            var inEventsSection = false;
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                
                // 检测进入 [Events] 部分
                if (line === '[Events]') {
                    inEventsSection = true;
                    continue;
                }
                
                // 检测离开 [Events] 部分（遇到其他 [xxx] 部分）
                if (line.startsWith('[') && inEventsSection) {
                    break; // 已经离开 Events 部分，停止搜索
                }
                
                // 只在 Events 部分内查找 Format 行
                if (inEventsSection && line.startsWith('Format:')) {
                    var fields = line.substring(7).split(',').map(function(f) {
                        return f.trim();
                    });
                    return {
                        fields: fields,
                        startIdx: fields.indexOf('Start'),
                        endIdx: fields.indexOf('End'),
                        textIdx: fields.indexOf('Text'),
                        styleIdx: fields.indexOf('Style'),
                        actorIdx: fields.indexOf('Name')
                    };
                }
            }
            
            return null; // 在 Events 部分中未找到 Format 行
        }
        
        // 辅助函数：解析 Dialogue 行，提取字幕信息
        function parseDialogueLine(line, formatInfo) {
            // 去掉 "Dialogue:" 前缀
            var content = line.substring(9);
            
            // 找到 Text 字段开始的位置（第 textIdx 个逗号之后）
            var commaCount = 0;
            var textStartPos = 0;
            for (var i = 0; i < content.length; i++) {
                if (content[i] === ',') {
                    commaCount++;
                    if (commaCount === formatInfo.textIdx) {
                        textStartPos = i + 1;  // 跳过逗号本身
                        break;
                    }
                }
            }
            
            // 直接提取 Text 字段（从 textStartPos 到结尾）
            var text = content.substring(textStartPos);
            
            // 提取 Text 之前的部分，用逗号切分获取其他字段
            var beforeText = content.substring(0, textStartPos - 1);
            var parts = beforeText.split(',');
            
            return {
                start: formatInfo.startIdx < parts.length ? parts[formatInfo.startIdx] : '',
                end: formatInfo.endIdx < parts.length ? parts[formatInfo.endIdx] : '',
                text: text,
                style: formatInfo.styleIdx >= 0 && formatInfo.styleIdx < parts.length ? parts[formatInfo.styleIdx] : '',
                actor: formatInfo.actorIdx >= 0 && formatInfo.actorIdx < parts.length ? parts[formatInfo.actorIdx] : ''
            };
        }
        
        // 辅助函数：清理字幕文本（去除样式标签、换行符）
        function cleanText(text) {
            // 去除样式标签 {xxx}
            text = text.replace(/\{[^}]+\}/g, '');
            // 将 \N 替换为换行符
            text = text.replace(/\\N/gi, '\n');
            return text.trim();
        }
        
        // 辅助函数：灵活解析 ASS 时间格式
        function parseAssTime(assTime) {
            // 支持 H:MM:SS.CC 或 H:MM:SS.CCC 格式
            var parts = assTime.split(':');
            var h = parseInt(parts[0], 10) || 0;
            var m = parseInt(parts[1], 10) || 0;
            
            // 处理秒和毫秒
            var secParts = parts[2].split('.');
            var s = parseInt(secParts[0], 10) || 0;
            var msStr = secParts[1] || '0';
            // 补齐到3位
            while (msStr.length < 3) {
                msStr += '0';
            }
            var ms = parseInt(msStr, 10) || 0;
            
            return h * 3600 + m * 60 + s + ms / 1000;
        }
        
        // 辅助函数：将 ASS 时间转换为 SRT 时间格式
        function assTimeToSrtTime(assTime) {
            var h = '00', m = '00', s = '00', ms = '000';
            var t = assTime.split(':');
            if (t.length > 0) {
                h = t[0].length == 1 ? '0' + t[0] : t[0];
            }
            if (t.length > 1) {
                m = t[1].length == 1 ? '0' + t[1] : t[1];
            }
            if (t.length > 2) {
                var t2 = t[2].split('.');
                if (t2.length > 0) {
                    s = t2[0].length == 1 ? '0' + t2[0] : t2[0];
                }
                if (t2.length > 0) {
                    ms = t2[1].length == 2 ? t2[1] + '0' : (t2[1].length == 1 ? t2[1] + '00' : t2[1]);
                }
            }
            return [h, m, s + ',' + ms].join(':');
        }
        
        // 主函数：ASS 转 SRT
        function ass2srt(assText) {
            var lines = String(assText).split(/\r*\n/);
            
            // 步骤 1: 解析 Format 行
            var formatInfo = parseFormatLine(lines);
            if (!formatInfo) {
                console.warn('No Format line found in ASS file, using default format');
                // 使用默认格式
                formatInfo = {
                    fields: ['Layer', 'Start', 'End', 'Style', 'Name', 'MarginL', 'MarginR', 'MarginV', 'Effect', 'Text'],
                    startIdx: 1,
                    endIdx: 2,
                    textIdx: 9,
                    styleIdx: 3,
                    actorIdx: 4
                };
            }
            
            // 步骤 2: 解析所有 Dialogue 行
            var srts = [];
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                
                // 只处理 Dialogue 行，忽略 Comment 行和其他行
                if (!line.startsWith('Dialogue:')) {
                    continue;
                }
                
                var subtitle = parseDialogueLine(line, formatInfo);
                if (subtitle.start && subtitle.end && subtitle.text) {
                    var text = cleanText(subtitle.text);
                    srts.push({
                        start: subtitle.start,
                        end: subtitle.end,
                        text: text
                    });
                }
            }
            
            // 步骤 3: 排序并转换为 SRT 格式
            var i = 1;
            var output = srts.sort(function(d1, d2) {
                var s1 = parseAssTime(d1.start);
                var s2 = parseAssTime(d2.start);
                var e1 = parseAssTime(d1.end);
                var e2 = parseAssTime(d2.end);
                
                return s1 != s2 ? s1 - s2 : e1 - e2;
            }).map(function(srt) {
                var start = assTimeToSrtTime(srt.start);
                var end = assTimeToSrtTime(srt.end);
                return (i++) + '\n'
                    + start + ' --> ' + end + '\n'
                    + srt.text + '\n\n';
            }).join('');
            
            return output;
        }
        
        // 暴露到全局
        window.ass2srt = ass2srt;
    </script>
    <script>
        var isResizing = false;
        var isResizingVertically = false;

        // 通过拖动水平分割线调整视频高度
        $(function () {
            var video = $('#video');

            $('#toggleLayout').change(function () {
                if ($(this).is(':checked')) {
                    $('#container').addClass('container-layout-reversed').removeClass('container-layout-normal');
                    $('#video-player').addClass('video-layout-reversed').removeClass('video-layout-normal');
                } else {
                    $('#container').addClass('container-layout-normal').removeClass('container-layout-reversed');
                    $('#video-player').addClass('video-layout-normal').removeClass('video-layout-reversed');
                }
            });

            var needInitAudioCtx = true;
            var gainNode = null;
            $('#mediaGain').on('input', () => {
                if (needInitAudioCtx) {
                    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    gainNode = audioCtx.createGain();
                    var mediaElementSource = audioCtx.createMediaElementSource(document.getElementById("video"));
                    mediaElementSource.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    needInitAudioCtx = false;
                }
                gainNode.gain.value = parseInt(document.getElementById("mediaGain").value, 10);
            });

            const hideControlsStyle = document.createElement('style');
            hideControlsStyle.innerHTML = `
                video::-webkit-media-controls-panel {
                    display: none !important;
                }
                video::-webkit-media-controls-play-button {
                    display: none !important;
                }
            `;

            function waitForVideoReadyForOcr(timeoutMs) {
                timeoutMs = typeof timeoutMs === 'number' ? timeoutMs : 15000;
                const video = document.getElementById('video');
                if (!video || !video.currentSrc) {
                    return Promise.resolve({ reason: 'no-video', readyState: video ? video.readyState : null });
                }
                if (video.readyState >= 1) {
                    return Promise.resolve({ reason: 'already-ready', readyState: video.readyState });
                }

                return new Promise((resolve) => {
                    let done = false;
                    let timer = null;

                    function finish(reason) {
                        if (done) {
                            return;
                        }
                        done = true;
                        if (timer) {
                            clearTimeout(timer);
                        }
                        video.removeEventListener('loadedmetadata', onLoadedMetadata);
                        video.removeEventListener('canplay', onCanPlay);
                        video.removeEventListener('error', onError);
                        resolve({ reason: reason, readyState: video.readyState });
                    }

                    function onLoadedMetadata() {
                        finish('loadedmetadata');
                    }

                    function onCanPlay() {
                        finish('canplay');
                    }

                    function onError() {
                        finish('video-error');
                    }

                    timer = setTimeout(function () {
                        finish('timeout');
                    }, timeoutMs);

                    video.addEventListener('loadedmetadata', onLoadedMetadata);
                    video.addEventListener('canplay', onCanPlay);
                    video.addEventListener('error', onError);
                });
            }

            function yieldToMainThread(timeoutMs) {
                timeoutMs = typeof timeoutMs === 'number' ? timeoutMs : 16;
                return new Promise(function (resolve) {
                    var done = false;
                    function finish() {
                        if (done) {
                            return;
                        }
                        done = true;
                        resolve();
                    }
                    if (typeof requestAnimationFrame === 'function') {
                        requestAnimationFrame(finish);
                    }
                    setTimeout(finish, timeoutMs);
                });
            }

            function isVideoLikeName(name) {

            function sortFilesVideoFirst(files) {

            async function processFilesImpl(files) {
                var orderedFiles = sortFilesVideoFirst(files);
                svpSupLog('processFilesImpl ordered', { names: orderedFiles.map(function (f) { return f.name; }) });
                for (var i = 0; i < orderedFiles.length; i++) {
                    if (orderedFiles[i].name.toLowerCase().endsWith('.mp4') || orderedFiles[i].name.toLowerCase().endsWith('.webm')) {
                        var url = URL.createObjectURL(orderedFiles[i]);
                        $('#video').attr('src', url);

                        setCurrentMovieCacheIdFromFile(orderedFiles[i], orderedFiles[i].name);

                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.ass')) {
                        srtLoaded = true
                        await loadSubtitles(orderedFiles[i], formatIsAss = true);
                        setCurrentSubtitleContext('ass', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.srt')) {
                        srtLoaded = true
                        await loadSubtitles(orderedFiles[i]);
                        setCurrentSubtitleContext('local-srt', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.json')) {

                            await loadSubtitlesFromJSON(orderedFiles[i]);
                            setCurrentSubtitleContext('json', orderedFiles[i]);

                        loadDiarizationInfo(orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.html')) {
                        await loadSupFromHtml(orderedFiles[i])
                        setCurrentSubtitleContext('sup-html', orderedFiles[i]);
                    } else if (orderedFiles[i].name.toLowerCase().endsWith('.sup')) {
                        await loadSupFromSup(orderedFiles[i], orderedFiles[i].name)
                        setCurrentSubtitleContext('sup', orderedFiles[i]);
                    }
                }
            }

            function processFiles(e) {

            // Set up event listener for video file input
            $('#videoFile').change(processFiles);

            function loadSupFromHtml(file) {
                return new Promise((resolve, reject) => {
                    clearAllSub()
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        const htmlContent = e.target.result;

                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlContent, 'text/html');

                        const divs = doc.querySelectorAll('body > div');
                        tempSubtitles = [];

                        divs.forEach(div => {
                            // 获取div内部的文本，即时间和#号开头的文本
                            const text = div.previousSibling.textContent.trim();
                            // 使用正则表达式匹配时间和图片源
                            const match = text.match(/#(\d+):((\d+):)?(\d+):(\d+),(\d+)->((\d+):)?(\d+):(\d+),(\d+)/);
                            const imgSrc = div.querySelector('img').src.split('/').pop()

                            if (match) {
                                // 转换时间为秒
                                const startTime = (parseInt(match[3] || 0) * 3600) + (parseInt(match[4]) * 60) + parseInt(match[5]) + parseInt(match[6]) / 1000;
                                const endTime = (parseInt(match[8] || 0) * 3600) + (parseInt(match[9]) * 60) + parseInt(match[10]) + parseInt(match[11]) / 1000;
                                // 添加到结果列表
                                tempSubtitles.push({
                                    start: accTime(startTime),
                                    end: accTime(endTime),
                                    text: "<img class='sup-subtitle-image' src='sup/" + imgSrc + "' />"
                                });
                            }
                        });

                        loadSubtitlesImpl()
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            function loadSupFromSup(file, sourceIdOverride) {
                return new Promise((resolve, reject) => {
                    clearAllSub();

                    var runId = ++supRunSeq;
                    svpSupLog('loadSupFromSup start', {
                        runId: runId,
                        sourceIdOverride: sourceIdOverride,
                        fileName: file && file.name ? file.name : null,
                        fileSize: file && typeof file.size === 'number' ? file.size : null,
                        fileLastModified: file && typeof file.lastModified === 'number' ? file.lastModified : null,
                        movieId: getCurrentMovieCacheId(),
                    });

                    const supId = window.SupOcrCache.makeSupId(file, sourceIdOverride);
                    const movieId = getCurrentMovieCacheId();
                    const cacheKey = window.SupOcrCache.makeCacheKey(movieId, supId);

                    svpSupLog('loadSupFromSup cacheKey', { runId: runId, supId: supId, movieId: movieId, cacheKey: cacheKey });

                    // Fast path: fully converted result exists.
                    window.SupOcrCache.get(cacheKey).then(async (cached) => {
                        svpSupLog('loadSupFromSup cache lookup result', {
                            runId: runId,
                            hasCached: !!cached,
                            status: cached ? cached.status : null,
                            cues: cached && cached.cues ? cached.cues.length : null,
                            doneCount: cached && typeof cached.doneCount === 'number' ? cached.doneCount : null,
                        });
                        if (cached && cached.status === 'complete' && Array.isArray(cached.cues) && cached.cues.length > 0) {
                            showFloatingToast('已从缓存恢复 SUP 转换结果', 'success');
                            tempSubtitles = cached.cues.map((c) => ({
                                start: c.start,
                                end: c.end,
                                text: c.text,
                            }));
                            await loadSupSubtitlesImpl();
                            svpSupLog('loadSupFromSup cache hit complete - restored', { runId: runId, count: tempSubtitles.length });
                            resolve();
                            return;
                        }

                        // Partial/no cache: parse SUP to get timing + bitmaps for missing OCR.
                        const reader = new FileReader();
                        reader.onload = async function (e) {
                            try {
                                const tParse0 = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                                const arrayBuffer = e.target.result;
                                const cues = await window.SupPgsParser.parseSupPgsToCues(arrayBuffer);
                                const tParse1 = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                                svpSupLog('loadSupFromSup parsed cues', { runId: runId, cueCount: cues.length, elapsedMs: (tParse1 - tParse0) });

                                // Initialize or validate cache shape.
                                let cacheEntry = cached;
                                if (!window.SupOcrCache.isUsableEntry(cacheEntry, cues.length)) {
                                    svpSupLog('loadSupFromSup initializing new cache entry', { runId: runId });
                                    cacheEntry = window.SupOcrCache.createEntry({
                                        key: cacheKey,
                                        supId,
                                        movieId,
                                        cues: cues.map((c) => ({ start: c.start, end: c.end, text: '' })),
                                    });
                                    await window.SupOcrCache.put(cacheEntry);
                                    svpSupLog('loadSupFromSup cache entry created', { runId: runId, cueCount: cacheEntry.cues.length });
                                }

                                // Build subtitles; use cached text when available, otherwise keep DOM lightweight.
                                tempSubtitles = cues.map((cue, idx) => {
                                    const cachedText = (cacheEntry.cues[idx] && cacheEntry.cues[idx].text) ? String(cacheEntry.cues[idx].text) : '';
                                    if (cachedText) {
                                        return {
                                            start: cue.start,
                                            end: cue.end,
                                            text: cachedText,
                                            listText: cachedText,
                                            __ocrSkip: true,
                                            __ocrResolved: true,
                                        };
                                    }
                                    return {
                                        start: cue.start,
                                        end: cue.end,
                                        text: '',
                                        listText: buildSupPendingText(idx, cues.length),
                                        imageRawData: cue.imageRawData,
                                        __ocrResolved: false,
                                    };
                                });

                                let cachedCount = 0;
                                for (let i = 0; i < tempSubtitles.length; i++) {
                                    if (tempSubtitles[i].__ocrSkip === true) {
                                        cachedCount++;
                                    }
                                }

                                if (cachedCount > 0) {
                                    if (cachedCount >= tempSubtitles.length) {
                                        showFloatingToast('字幕结果已全部从缓存恢复', 'success');
                                    } else {
                                        showFloatingToast('已恢复 ' + cachedCount + '/' + tempSubtitles.length + ' 条缓存，继续补全 OCR', 'info', 3200);
                                    }
                                } else {
                                    showFloatingToast('开始转换 SUP 字幕，请稍候', 'info');
                                }

                                svpSupLog('loadSupFromSup prepared subtitles list', { runId: runId, total: tempSubtitles.length, cachedCount: cachedCount });

                                await loadSupSubtitlesImpl();

                                // Persist progress immediately so partial runs can resume next time.
                                let persistTimer = null;
                                let persistInFlight = false;
                                let persistRequested = false;

                                function persistCacheEntry(force) {
                                    if (force === true) {
                                        persistRequested = false;
                                        schedulePersist(0);
                                        return;
                                    }
                                    persistRequested = true;
                                    schedulePersist(400);
                                }

                                function schedulePersist(delayMs) {
                                    if (persistTimer) {
                                        clearTimeout(persistTimer);
                                    }
                                    persistTimer = setTimeout(function () {
                                        persistTimer = null;
                                        if (persistInFlight) {
                                            persistRequested = true;
                                            schedulePersist(250);
                                            return;
                                        }
                                        if (!persistRequested && delayMs !== 0) {
                                            return;
                                        }
                                        persistInFlight = true;
                                        persistRequested = false;
                                        window.SupOcrCache.put(cacheEntry).catch(function (err) {
                                            console.warn('SUP OCR cache save failed:', err);
                                        }).finally(function () {
                                            persistInFlight = false;
                                            if (persistRequested) {
                                                schedulePersist(250);
                                            }
                                        });
                                        svpSupLog('loadSupFromSup persist cache', { runId: runId, status: cacheEntry.status, doneCount: cacheEntry.doneCount, total: cacheEntry.cues.length });
                                    }, delayMs);
                                }

                                // Ensure doneCount is accurate.
                                let doneCount = 0;
                                let resolvedCount = 0;
                                let failedCount = 0;
                                for (let i = 0; i < cacheEntry.cues.length; i++) {
                                    if (cacheEntry.cues[i] && cacheEntry.cues[i].text) {
                                        doneCount++;
                                        resolvedCount++;
                                    }
                                }

                                setTimeout(async function () {
                                    const waitResult = await waitForVideoReadyForOcr(15000);
                                    svpSupLog('loadSupFromSup video ready gate', { runId: runId, waitResult: waitResult });
                                    if (waitResult.reason !== 'already-ready') {
                                        showFloatingToast('视频已准备，开始 OCR 初始化', 'info', 2200);
                                    }

                                    var pendingDomUpdates = [];
                                    var domFlushScheduled = false;
                                    var ocrFinalized = false;

                                    function scheduleDomFlush(force) {
                                        if (force === true) {
                                            flushSupSubtitleDomBatch(pendingDomUpdates, pendingDomUpdates.length || 1);
                                            domFlushScheduled = false;
                                            return;
                                        }
                                        if (domFlushScheduled) {
                                            return;
                                        }
                                        domFlushScheduled = true;
                                        yieldToMainThread(16).then(function () {
                                            domFlushScheduled = false;
                                            flushSupSubtitleDomBatch(pendingDomUpdates, 100);
                                            if (pendingDomUpdates.length > 0) {
                                                scheduleDomFlush(false);
                                            }
                                        });
                                    }

                                    function finalizeSupOcrRun() {
                                        if (ocrFinalized) {
                                            return;
                                        }
                                        ocrFinalized = true;
                                        scheduleDomFlush(true);
                                        persistCacheEntry(true);
                                        if (failedCount > 0) {
                                            showFloatingToast('SUP OCR 已完成，仍有 ' + failedCount + ' 条未识别；刷新页面可重试', 'warning', 4200);
                                            svpSupLog('loadSupFromSup OCR complete with unresolved items', { runId: runId, total: cacheEntry.cues.length, doneCount: doneCount, resolvedCount: resolvedCount, failedCount: failedCount });
                                        } else {
                                            showFloatingToast('SUP OCR 已完成并写入缓存', 'success');
                                            svpSupLog('loadSupFromSup OCR complete', { runId: runId, total: cacheEntry.cues.length });
                                        }
                                    }

                                    window.PaddleSubtitleOcr.recognizeSupItems(tempSubtitles, ({ index, text, recognized, attemptsUsed }) => {
                                        const subtitleItem = tempSubtitles[index];
                                        if (!subtitleItem) {
                                            return;
                                        }

                                        const isRecognized = recognized !== false && !!text;
                                        const wasResolved = subtitleItem.__ocrResolved === true;
                                        const prev = cacheEntry.cues[index] ? String(cacheEntry.cues[index].text || '') : '';

                                        if (!wasResolved) {
                                            resolvedCount++;
                                        }

                                        if (isRecognized) {
                                            if (!prev) {
                                                doneCount++;
                                            }
                                            cacheEntry.cues[index] = {
                                                start: subtitleItem.start,
                                                end: subtitleItem.end,
                                                text: text,
                                            };
                                            subtitleItem.text = text;
                                            subtitleItem.listText = text;
                                            if (subtitles[index]) {
                                                subtitles[index].text = text;
                                            }
                                            pendingDomUpdates.push({ index: index, text: text });
                                        } else {
                                            if (!wasResolved) {
                                                failedCount++;
                                            }
                                            cacheEntry.cues[index] = {
                                                start: subtitleItem.start,
                                                end: subtitleItem.end,
                                                text: '',
                                            };
                                            subtitleItem.text = '';
                                            subtitleItem.listText = buildSupFailedText(index, cacheEntry.cues.length, attemptsUsed);
                                            if (subtitles[index]) {
                                                subtitles[index].text = '';
                                            }
                                            pendingDomUpdates.push({ index: index, text: subtitleItem.listText });
                                        }

                                        subtitleItem.__ocrResolved = true;
                                        subtitleItem.__ocrSkip = true;
                                        subtitleItem.imageRawData = null;

                                        if (doneCount >= cacheEntry.cues.length) {
                                            cacheEntry.status = 'complete';
                                        } else {
                                            cacheEntry.status = 'partial';
                                        }
                                        cacheEntry.doneCount = doneCount;
                                        persistCacheEntry(false);
                                        scheduleDomFlush(false);

                                        if (resolvedCount >= cacheEntry.cues.length) {
                                            finalizeSupOcrRun();
                                        }
                                    }).then(() => {
                                        if (resolvedCount >= cacheEntry.cues.length) {
                                            finalizeSupOcrRun();
                                        } else {
                                            scheduleDomFlush(true);
                                            persistCacheEntry(true);
                                            showFloatingToast('SUP OCR 本轮结束，仍有 ' + (cacheEntry.cues.length - resolvedCount) + ' 条未完成，刷新页面可重试', 'warning', 4200);
                                            svpSupLog('loadSupFromSup OCR finished with unresolved pending items', { runId: runId, total: cacheEntry.cues.length, doneCount: doneCount, resolvedCount: resolvedCount, failedCount: failedCount });
                                        }
                                    }).catch(err => {
                                        console.error('SUP OCR failed:', err);
                                        cacheEntry.doneCount = doneCount;
                                        scheduleDomFlush(true);
                                        persistCacheEntry(true);
                                        showFloatingToast('SUP OCR 中断，已保存当前进度', 'warning', 3200);
                                        svpSupLog('loadSupFromSup OCR failed', { runId: runId, message: String(err && err.message ? err.message : err), stack: err && err.stack ? String(err.stack) : null });
                                    });
                                }, 0);

                                resolve();
                            } catch (err) {
                                reject(err);
                            }
                        };
                        reader.onerror = reject;
                        reader.readAsArrayBuffer(file);
                    }).catch(reject);
                });
            }

            async function loadSupSubtitlesImpl() {
                subtitles = [];
                bindSupSubtitleClickHandler();

                var subtitlesContainer = document.getElementById('subtitles');
                var batchSize = 200;
                for (let i = 0; i < tempSubtitles.length; i += batchSize) {
                    var fragment = document.createDocumentFragment();
                    var end = Math.min(i + batchSize, tempSubtitles.length);
                    for (let j = i; j < end; j++) {
                        subtitles.push({ start: tempSubtitles[j].start, end: tempSubtitles[j].end, text: tempSubtitles[j].text });
                        var subtitleDiv = document.createElement('div');
                        subtitleDiv.className = 'subtitle';
                        subtitleDiv.setAttribute('data-index', String(j));
                        subtitleDiv.textContent = tempSubtitles[j].listText || tempSubtitles[j].text || '';
                        fragment.appendChild(subtitleDiv);
                    }
                    subtitlesContainer.appendChild(fragment);
                    if (end < tempSubtitles.length) {
                        await yieldToMainThread(16);
                    }
                }
                $('#subtitles').css('width', window.innerWidth - $('#video-player').width() - $('#divider').width() + 'px');
            }

            function loadSubtitlesFromJSONImpl(triggeredFromSentenceLength = false) {
                subtitles = [];
                // Combine short subtitles
                var i = 0;
                while (i < tempSubtitles.length) {
                    var sentence_div = document.createElement('div');
                    var sentence_text = tempSubtitles[i].text;
                    var sentence_start = tempSubtitles[i].start;
                    var sentence_end = tempSubtitles[i].end;

                    function appendWords() {
                        var words = tempSubtitles[i].words;
                        words.forEach(function (word) {
                            var word_span = document.createElement('span');
                            word_span.innerText = word.word;
                            word_span.style.cursor = 'pointer';
                            word_span.onclick = function (event) {
                                event.stopPropagation();
                                video.currentTime = getShiftedSubtitleTime(word.start);
                                if ($('#clickToPlay').prop('checked')) {
                                    $('#video')[0].play();
                                }
                                $('#video')[0].focus();
                            };
                            word_span.setAttribute('data-start', accTime(word.start));
                            word_span.setAttribute('data-end', accTime(word.end));
                            word_span.className = 'subtitle-word'
                            sentence_div.appendChild(word_span);
                        });
                    }

                    appendWords()

                    function whileCondition(i) {
                        if (triggeredFromSentenceLength) {
                            let minLength = parseInt(document.getElementById("textLength").value, 10);
                            return sentence_text.length < minLength
                        } else {
                            let checked = $('#enableTimeConcat').prop('checked')
                            let adjacent = tempSubtitles[i + 1].start - sentence_end < parseFloat(document.getElementById('timeConcat').value)
                            return checked && adjacent
                        }
                    }

                    while (i + 1 < tempSubtitles.length && whileCondition(i)) {
                        i++;
                        sentence_text += "，" + tempSubtitles[i].text;
                        sentence_end = tempSubtitles[i].end;
                        let span = document.createElement('span');
                        span.textContent = "，";
                        (function (currentI) {
                            span.onclick = function (event) {
                                event.stopPropagation();
                                video.currentTime = getShiftedSubtitleTime(tempSubtitles[currentI].start);
                                if ($('#clickToPlay').prop('checked')) {
                                    $('#video')[0].play();
                                }
                                $('#video')[0].focus();
                            };
                        })(i)
                        sentence_div.append(span);
                        appendWords()
                    }
                    subtitles.push({ start: sentence_start, end: sentence_end, text: sentence_text });
                    sentence_div.className = 'subtitle';
                    sentence_div.setAttribute('data-index', subtitles.length - 1);
                    sentence_div.setAttribute('data-sentence-start', sentence_start);
                    sentence_div.setAttribute('data-sentence-end', sentence_end);

                    var transparent_sentence_div = document.createElement('div');
                    transparent_sentence_div.textContent = sentence_text;
                    transparent_sentence_div.className = 'transparent-sentence';
                    sentence_div.append(transparent_sentence_div);

                    $('#subtitles').append(sentence_div)
                    i++;
                }
                // Set up event listener for clicking on subtitles
                $('.subtitle').click(function () {
                    var index = $(this).data('index');
                    $('#video')[0].currentTime = getShiftedSubtitleTime(subtitles[index].start);
                    if ($('#clickToPlay').prop('checked')) {
                        $('#video')[0].play();
                    }
                    $('#video')[0].focus();
                });
                $('#subtitles').css('width', window.innerWidth - $('#video-player').width() - $('#divider').width() + 'px');
            }


            function loadSubtitlesFromJSON(file) {
                return new Promise((resolve, reject) => {
                    clearAllSub()

                    reader.onload = function (event) {
                        var asr_data = JSON.parse(event.target.result).asr_info;

                        tempSubtitles = [];

                        asr_data.forEach(function (sentence) {
                            tempSubtitles.push({ start: accTime(sentence.start), end: accTime(sentence.end), text: sentence.text.trim(), words: sentence.words });
                        });

                        loadSubtitlesFromJSONImpl();
                        resolve()
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            function loadDiarizationInfo(file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    const data = JSON.parse(event.target.result);
                    const diarizationInfo = data.diarization_info;
                    const videoDuration = data.video_duration;

                    // Determine unique labels and assign them a vertical position
                    const labels = [...new Set(diarizationInfo.map(info => info.label))];
                    const labelHeights = {};
                    const heightIncrement = 100 / labels.length;
                    labels.forEach((label, index) => {
                        labelHeights[label] = index * heightIncrement;
                    });

                    // Process the data
                    visualizeSpeakers(diarizationInfo, labelHeights, heightIncrement, labels, videoDuration);
                };
                reader.readAsText(file);
            }

            function visualizeSpeakers(diarizationInfo, labelHeights, heightIncrement, labels, videoDuration) {
                const video = document.getElementById('video');
                const videoPlayer = document.getElementById('video-player');

                const existingContainer = document.getElementById('speaker-container');
                if (existingContainer) {
                    videoPlayer.removeChild(existingContainer);
                }

                const container = document.createElement('div');
                container.id = 'speaker-container';  // Assigning an ID to the container for easy reference
                container.style.border = '1px solid #aaa';
                let speakerCount = Object.keys(labelHeights).length;
                let speakerDivHeight = speakerCount <= 4 ? 40 : (speakerCount <= 8 ? 30 : (speakerCount <= 16 ? 20 : 10));
                container.style.height = (speakerCount * speakerDivHeight) + 'px'; // Adjust height based on number of speakers
                container.style.position = 'relative';
                container.style.marginTop = '10px';
                container.style.overflow = 'hidden';

                // Define a set of colors
                const colors = ['#e41a1c', '#377eb8', '#4daf4a', '#984ea3', '#ff7f00', '#ffff33', '#a65628', '#f781bf'];

                diarizationInfo.forEach(info => {
                    const speakerDiv = document.createElement('div');
                    const startPercentage = (info.start / videoDuration) * 100;
                    const endPercentage = (info.end / videoDuration) * 100;

                    speakerDiv.style.position = 'absolute';
                    speakerDiv.style.top = labelHeights[info.label] + '%';
                    speakerDiv.style.height = heightIncrement + '%';
                    speakerDiv.style.left = startPercentage + '%';
                    speakerDiv.style.width = (endPercentage - startPercentage) + '%';
                    speakerDiv.style.background = colors[labels.indexOf(info.label) % colors.length];
                    speakerDiv.title = info.label;

                    container.appendChild(speakerDiv);
                });

                // Create and add the progress line to the container
                const progressLine = document.createElement('div');
                progressLine.style.position = 'absolute';
                progressLine.style.top = '0';
                progressLine.style.bottom = '0';
                progressLine.style.width = '1px';
                progressLine.style.background = '#000000';  // Color of the progress line
                container.appendChild(progressLine);

                // Update the position of the progress line based on the video's current time
                video.addEventListener('timeupdate', function () {
                    const progressPercentage = (video.currentTime / videoDuration) * 100;
                    progressLine.style.left = progressPercentage + '%';
                });

                // Jump to the clicked position in the video
                container.addEventListener('click', function (event) {
                    let clickPosition = event.offsetX;
                    // Adjust the click position if the target is a speakerDiv
                    if (event.target !== container) {
                        clickPosition += event.target.offsetLeft;
                    }
                    const containerWidth = container.offsetWidth;
                    const clickedPercentage = (clickPosition / containerWidth);
                    video.currentTime = clickedPercentage * videoDuration;
                    $('#video')[0].focus();
                });

                videoPlayer.appendChild(container);

            }

            function highlightSubtitle() {
                var currentTime = getSubtitleTimelineTime($('#video')[0].currentTime);
                // 更新标题显示播放进度
                var originalTitle = document.title.replace(/^\[\d+%\]\s*/, '');

                document.title = `[${progress}%]${originalTitle}`;
                var found = false;
                var first_match_sub_index = null;
                var captions = [];
                $('.subtitle').removeClass('highlight');
                for (var i = 0; i < subtitles.length; i++) {
                    if (currentTime >= subtitles[i].start && currentTime < subtitles[i].end) {
                        var activeSubtitle = $('.subtitle[data-index=' + i + ']');
                        activeSubtitle.addClass('highlight');
                        var transparentSentenceDiv = activeSubtitle.find('.transparent-sentence');
                        var supSubtitleImage = activeSubtitle.find('.sup-subtitle-image');
                        if (transparentSentenceDiv.length) {
                            captions.push(transparentSentenceDiv.text());
                        } else if (supSubtitleImage.length) {
                            supSubtitleImage.each(function (index, element) {
                                captions.push(element.outerHTML);
                            })
                        } else {
                            captions.push(activeSubtitle.text());
                        }
                        // Check if active subtitle is in the viewport
                        var subtitlesBox = $('#subtitles');
                        var scrollTop = subtitlesBox.scrollTop();
                        var scrollBottom = scrollTop + subtitlesBox.height();
                        var activeSubtitleTop = activeSubtitle.position().top + scrollTop;
                        var activeSubtitleBottom = activeSubtitleTop + activeSubtitle.height();

                        if (activeSubtitleTop < scrollTop || activeSubtitleBottom > scrollBottom - 34) {
                            // Scroll to active subtitle
                            subtitlesBox.scrollTop(activeSubtitleTop - 33);
                        }
                        found = true;

                        if (first_match_sub_index !== null && i - first_match_sub_index > 10) {
                            break;
                        } else {
                            first_match_sub_index = i;
                        }
                    }
                }

                if (captions.length > 1) {
                    captions.splice(-1, 0, '-'.repeat(Math.max(...captions.map(item => item.length))));

                $('#caption').html(captions.join('<br>'));

                let captionSup = document.querySelector("#caption img.sup-subtitle-image");

            // STATE MACHINE REFACTOR
            const PLAYER_STATE = {
                NORMAL: 'NORMAL',
                FAST_FORWARDING: 'FAST_FORWARDING',
                RESTORING: 'RESTORING'
            };

            var playerState = {
                currentState: PLAYER_STATE.NORMAL,
                originalSpeed: 1,
                targetTime: 0,
                needCalibration: false,
                skipCalibrationBySubClick: false
            };

            function checkIsDuringSubtitle(currentTime) {
                currentTime = getSubtitleTimelineTime(currentTime);
                const skipIntervalChecked = $('#enableSkipInterval').prop('checked');
                const skipInterval = parseFloat(document.getElementById('skipInterval').value);
                const sentenceExtensionChecked = $('#enableSentenceExtension').prop('checked');
                const sentenceExtension = parseFloat(document.getElementById('sentenceExtension').value);

                return subtitles.some(sub => {
                    if (skipIntervalChecked) {
                        return sub.start <= currentTime && (sub.end < sub.start + skipInterval ? sub.end : sub.start + skipInterval) > currentTime;
                    } else if (sentenceExtensionChecked) {
                        return accTime(sub.start - sentenceExtension) <= currentTime && accTime(sub.end + sentenceExtension) > currentTime;
                    } else {
                        return sub.start <= currentTime && sub.end > currentTime;
                    }
                });
            }

            function calculateFastForwardSpeed(duration, originalSpeed) {
                let fastForwardSpeed = 8;
                for (let s = 2; s < 8; s++) {
                    if (duration <= s * 2) {
                        fastForwardSpeed = s;
                        break;
                    }
                }
                if (originalSpeed > 1) {
                    fastForwardSpeed *= originalSpeed;
                }
                // Add a cap to prevent the browser from throwing an error
                if (fastForwardSpeed > 16) {
                    fastForwardSpeed = 16;
                }
                return fastForwardSpeed;
            }

            function fastForwardCheckLoop() {
                // 2. FAST_FORWARDING State: Monitor playback and transition to RESTORING when target reached or subtitle detected
                if (playerState.currentState !== PLAYER_STATE.FAST_FORWARDING) {
                    return; // Stop the loop if we are no longer in fast-forwarding state
                }

                const video = $('#video')[0];
                const currentTime = accTime(video.currentTime);
                const isDuringSubtitle = checkIsDuringSubtitle(currentTime);

                if (currentTime >= playerState.targetTime || isDuringSubtitle) {
                    playerState.currentState = PLAYER_STATE.RESTORING;
                    updatePlayerState(); // Immediately call updatePlayerState to apply restoration without waiting for the next timeupdate tick.
                } else {
                    requestAnimationFrame(fastForwardCheckLoop); // Continue the loop
                }
            }

            // 更新播放速率显示颜色
            function updateVideoPlaybackRateColor(color) {
                const element = document.getElementById('videoPlaybackRate');
                element.style.color = color;
            }

            function updatePlayerState() {
                const video = $('#video')[0];
                const currentTime = accTime(video.currentTime);

                // --- STATE MACHINE ---

                // 1. NORMAL State: Check if we need to start fast forwarding
                if (playerState.currentState === PLAYER_STATE.NORMAL) {
                    playerState.originalSpeed = video.playbackRate; // Original speed could only be record in normal state

                    if (playerState.skipCalibrationBySubClick) {
                        playerState.skipCalibrationBySubClick = false;
                    }

                    const skipBlanks = $('#skipBlanks').prop('checked');
                    if (skipBlanks) {
                        const isDuringSubtitle = checkIsDuringSubtitle(currentTime);
                        const subtitleTimelineTime = getSubtitleTimelineTime(currentTime);

                        if (!isDuringSubtitle) {
                            const nextSubtitle = subtitles.find(sub => sub.start > subtitleTimelineTime);
                            if (nextSubtitle) {
                                const sentenceExtensionChecked = $('#enableSentenceExtension').prop('checked');
                                const sentenceExtension = parseFloat(document.getElementById('sentenceExtension').value);
                                const targetTime = sentenceExtensionChecked ? getShiftedSubtitleTime(nextSubtitle.start - sentenceExtension) : getShiftedSubtitleTime(nextSubtitle.start);
                                const duration = targetTime - currentTime;
                                const enableFFMode = $('#enableFFMode').prop('checked');

                                if (enableFFMode) {
                                    if (duration > 1) {
                                        playerState.targetTime = targetTime;
                                        playerState.needCalibration = $('#FFWithoutCalibration').prop('checked') ? false : duration > 3;
                                        playerState.currentState = PLAYER_STATE.FAST_FORWARDING;

                                        video.playbackRate = calculateFastForwardSpeed(duration, playerState.originalSpeed);
                                        $('#ff-sign').removeClass('hide-element');

                                        // 更新播放速率显示颜色为红紫色（快进状态）
                                        updateVideoPlaybackRateColor('#C94AFF');

                                        // Start the high-frequency check loop
                                        requestAnimationFrame(fastForwardCheckLoop);
                                    }
                                } else {
                                    video.currentTime = targetTime;
                                }
                            } else {
                                // Handle blank space at the end of the video
                                const enableFFMode = $('#enableFFMode').prop('checked');
                                if (enableFFMode) {
                                    const duration = video.duration - currentTime;
                                    if (duration > 1) {
                                        playerState.targetTime = video.duration;
                                        playerState.currentState = PLAYER_STATE.FAST_FORWARDING;
                                        video.playbackRate = calculateFastForwardSpeed(duration, playerState.originalSpeed);
                                        $('#ff-sign').removeClass('hide-element');

                                        // Start the high-frequency check loop
                                        requestAnimationFrame(fastForwardCheckLoop);
                                    }
                                } else {
                                    video.currentTime = video.duration;
                                    video.pause();
                                    $('#skipBlanks').trigger('click');
                                    setTimeout(() => {
                                        $('#skipBlanks').trigger('click');
                                    }, 1000);
                                }
                            }
                        }
                    }
                } else if (playerState.currentState === PLAYER_STATE.RESTORING) {
                    // 3. RESTORING State: Restore speed and return to NORMAL
                    if (video.playbackRate == playerState.originalSpeed) {
                        playerState.currentState = PLAYER_STATE.NORMAL;
                    }
                    video.playbackRate = playerState.originalSpeed;
                    $('#ff-sign').addClass('hide-element');
                    // 恢复播放速率显示颜色为蓝色（正常状态）
                    updateVideoPlaybackRateColor('#3F51B5');
                    if (playerState.needCalibration && !playerState.skipCalibrationBySubClick) {
                        video.currentTime = playerState.targetTime;
                    }
                }

                // --- UI UPDATES ---
                highlightSubtitle();
            }



            function loadSubtitlesImpl(triggeredFromSentenceLength = false) {
                subtitles = [];
                // Combine short subtitles
                let minLength = parseInt(document.getElementById("textLength").value, 10);
                var i = 0;
                while (i < tempSubtitles.length) {
                    var text = tempSubtitles[i].text;
                    var start = tempSubtitles[i].start;
                    var end = tempSubtitles[i].end;

                    function whileCondition(i) {
                        if (triggeredFromSentenceLength) {
                            return text.length < minLength;
                        }

                        var checked = $('#enableTimeConcat').prop('checked');
                        if (checked) {
                            var timeConcat = parseFloat(document.getElementById('timeConcat').value);
                            if (isNaN(timeConcat)) {
                                return false;
                            }
                            var adjacent = tempSubtitles[i + 1].start - end < timeConcat;
                            return adjacent;
                        }

                        return text.length < minLength;
                    }

                    while (i + 1 < tempSubtitles.length && whileCondition(i)) {
                        i++;
                        text += "，" + tempSubtitles[i].text;
                        end = tempSubtitles[i].end;
                    }
                    // text += "。"
                    subtitles.push({ start: start, end: end, text: text });
                    $('#subtitles').append('<div class="subtitle" data-index="' + (subtitles.length - 1) + '">' + text + '</div>');
                    i++;
                }

                // Set up event listener for clicking on subtitles
                $('.subtitle').click(function () {
                    var index = $(this).data('index');

                    playerState.skipCalibrationBySubClick = true;

                    $('#video')[0].currentTime = getShiftedSubtitleTime(subtitles[index].start);
                    if ($('#clickToPlay').prop('checked')) {
                        $('#video')[0].play();
                    }
                    $('#video')[0].focus();
                });
                $('#subtitles').css('width', window.innerWidth - $('#video-player').width() - $('#divider').width() + 'px');
            }

            function loadSubtitles(file, formatIsAss = false) {
                return new Promise((resolve, reject) => {
                    clearAllSub()
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        // Parse SRT file
                        var data = e.target.result;
                        if (formatIsAss) {
                            data = ass2srt(data)
                        }
                        var lines = data.split('\n');

                        tempSubtitles = []; // Store unprocessed subtitles

                        for (var i = 0; i < lines.length; i++) {
                            if (lines[i].indexOf('-->') !== -1) {
                                var times = lines[i].split(' --> ');
                                var start = hmsToSeconds(times[0].trim());
                                var end = hmsToSeconds(times[1].trim());
                                var text = "";
                                for (var j = i + 1; j < lines.length; j++) {
                                    if (lines[j].trim() === "") {
                                        i = j;
                                        break;
                                    }
                                    text += lines[j] + "\n";
                                }
                                tempSubtitles.push({ start: accTime(start), end: accTime(end), text: text.trim() });
                            }
                        }

                        loadSubtitlesImpl()
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            function hmsToSeconds(time) {
                time = time.replace('.', ',');
                var parts = time.split(':');
                var secondsParts = parts[2].split(",");
                var hours = parseInt(parts[0], 10);
                var minutes = parseInt(parts[1], 10);
                var seconds = parseInt(secondsParts[0], 10);
                var milliseconds = parseInt(secondsParts[1], 10);
                return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
            }

            document.getElementById('fetchDufsFiles').addEventListener('click', function () {
                var dufsUrlElem = document.getElementById('dufsUrl');
                var dufsUrl = dufsUrlElem.value;
                if (!dufsUrl) {
                    dufsUrlElem.classList.add("blinking");
                    setTimeout(function () {
                        dufsUrlElem.classList.remove("blinking");
                    }, 500);
                    return
                }
                fetch(dufsUrl + '?simple')
                    .then(response => response.text())
                    .then(data => {
                        var files = data.split('\n');
                        var fileListHtml = files.map(file => {
                            if (
                                file.toLowerCase().endsWith('.mp4') ||
                                file.toLowerCase().endsWith('.webm') ||
                                file.toLowerCase().endsWith('.json') ||
                                file.toLowerCase().endsWith('.srt') ||
                                file.toLowerCase().endsWith('.ass') ||
                                file.toLowerCase().endsWith('.html') ||
                                file.toLowerCase().endsWith('.sup')
                            ) {
                                return `<label><input type="checkbox" name="file" value="${file}">${file}</label><br>`;
                            }
                        }).join('');
                        document.getElementById('fileList').innerHTML = fileListHtml;
                        document.getElementById('modalOverlay').style.display = 'block';
                    });
            });

            document.getElementById('loadSelectedFiles').addEventListener('click', async function () {
                srtLoaded = false
                var selectedFiles = Array.from(document.querySelectorAll('input[name="file"]:checked')).sort(function (a, b) {
                    var av = isVideoLikeName(a && a.value ? a.value : '');
                    var bv = isVideoLikeName(b && b.value ? b.value : '');
                    if (av === bv) {
                        return 0;
                    }
                    return av ? -1 : 1;
                });
                svpSupLog('loadSelectedFiles ordered', { names: selectedFiles.map(function (f) { return f.value; }) });
                for (let file of selectedFiles) {
                    var fileUrl = formatDufsBaseUrl(document.getElementById('dufsUrl').value) + file.value;
                    if (fileUrl.toLowerCase().endsWith('.mp4') || fileUrl.toLowerCase().endsWith('.webm')) {
                        document.getElementById('video').src = fileUrl;
                        document.title = file.value;
                        setCurrentMovieCacheIdFromFile(null, fileUrl);
                        $('#videoFileName').text(file.value);
                    } else {
                        try {
                            let response = await fetch(fileUrl);
                            let blob = await response.blob();

                            if (fileUrl.toLowerCase().endsWith('.srt')) {
                                srtLoaded = true;
                                await loadSubtitles(blob);
                                setCurrentSubtitleContext('remote-srt', blob, { fallbackName: file.value });
                            } else if (fileUrl.toLowerCase().endsWith('.ass')) {
                                srtLoaded = true;
                                await loadSubtitles(blob, formatIsAss = true);
                                setCurrentSubtitleContext('ass', blob, { fallbackName: file.value });
                            } else if (fileUrl.toLowerCase().endsWith('.json')) {
                                if (!srtLoaded) {
                                    await loadSubtitlesFromJSON(blob);
                                    setCurrentSubtitleContext('json', blob, { fallbackName: file.value });
                                }
                                loadDiarizationInfo(blob);
                            } else if (fileUrl.toLowerCase().endsWith('.html')) {
                                await loadSupFromHtml(blob);
                                setCurrentSubtitleContext('sup-html', blob, { fallbackName: file.value });
                            } else if (fileUrl.toLowerCase().endsWith('.sup')) {
                                await loadSupFromSup(blob, fileUrl);
                                setCurrentSubtitleContext('sup', blob, { fallbackName: file.value });
                            }

                        } catch (error) {
                            console.error("Fetch error: ", error);
                        }
                    }
                };
                document.getElementById('modalOverlay').style.display = 'none';
            });

            function formatDufsBaseUrl(url) {
                var baseUrl = url.split('?')[0];
                if (baseUrl[baseUrl.length - 1] !== '/') {
                    baseUrl += '/';
                }
                return baseUrl;
            }

            document.getElementById('closeFileList').addEventListener('click', function () {
                document.getElementById('modalOverlay').style.display = 'none';
            })

            $("#resizable-shade").resizable({
                handles: "all",
                classes: {
                    "ui-resizable-se": "ui-resizable-se-adjust-position",
                },
                containment: ".video_container"
            });
            $("#resizable-shade").draggable();

            var focusVideoTimer = null;
            (function () {
                let video = document.getElementById('video');
                let statusIcon = document.getElementById('videoFocusStatus');
                video.onblur = function () {
                    statusIcon.innerHTML = '❌<span style="color: red;">失焦</span>';
                    if (focusVideoTimer) {
                        clearTimeout(focusVideoTimer)
                    }
                    focusVideoTimer = setTimeout(function () {
                        video.focus();
                    }, 5000);
                };
                video.onfocus = function () {
                    if (focusVideoTimer) {
                        clearTimeout(focusVideoTimer)
                    }
                    statusIcon.innerHTML = '✔️<span style="color: #00D26A;">聚焦</span>';
                }
            })();

            (function () {
                let video = document.getElementById('video');
                let statusIcon = document.getElementById('videoCanPlayStatus');
                video.oncanplay = () => {
                    statusIcon.innerText = '🟡';
                    statusIcon.classList.add('blinking');
                }
                video.oncanplaythrough = () => {
                    statusIcon.innerText = '🟢';
                    statusIcon.classList.remove('blinking');
                }
                video.onwaiting = () => {
                    statusIcon.innerText = '🔴';
                    statusIcon.classList.add('blinking');
                }
                video.onseeking = () => {
                    statusIcon.innerText = '🔴';
                    statusIcon.classList.add('blinking');
                }
            })();

            document.getElementById("skipBlanks").addEventListener('click', function (event) {
                setTimeout(() => {
                    $('#video')[0].focus();
                }, 200);
            });

            $('#sideListSupHeight').on('input', function () {
                const subtitleImages = document.querySelectorAll('#subtitles .sup-subtitle-image');
                const value = parseInt(this.value, 10);
                subtitleImages.forEach(img => {
                    img.style.maxHeight = `${value}px`;
                });
            });

            document.getElementById('video').addEventListener('loadedmetadata', function () {
                const video = this;
                const duration = video.duration;
                const minutes = Math.round(duration / 60);
                document.getElementById('videoDurationInfo').innerHTML = `${minutes}<span id="videoDurationInfoMin">min</span>`;
            });

            document.getElementById('video').addEventListener('loadstart', function () {
                document.getElementById('videoDurationInfo').innerHTML = "⏱️";
            });

            $('#blurAllSub').change(function () {
                if ($(this).is(':checked')) {
                    $('.subtitle').addClass('censored');
                } else {
                    $('.subtitle').addClass('none-blur');
                    $('.subtitle').removeClass('censored');
                    setTimeout(() => {
                        $('.subtitle').removeClass('none-blur');
                    }, 500);
                }
            });

            (function () {
                const subtitlesWidthSequence = [50, 60, 70, 80, 40, 30, 20];
                let currentWidthIndex = 0;

                const cycleButton = $('#cycleSubtitlesWidth');

                cycleButton.on('click', function () {
                    const windowWidth = window.innerWidth;
                    const dividerWidth = $('#divider').width();

                    const newSubtitlesWidthPercent = subtitlesWidthSequence[currentWidthIndex];
                    const newSubtitlesWidthPx = (newSubtitlesWidthPercent / 100) * windowWidth;
                    const newVideoPlayerWidthPx = windowWidth - newSubtitlesWidthPx - dividerWidth;

                    $('#subtitles').css('width', newSubtitlesWidthPx + 'px');
                    $('#video-player').css('width', newVideoPlayerWidthPx + 'px');

                    cycleButton.text(`当前宽度: ${subtitlesWidthSequence[currentWidthIndex]}%`);

                    currentWidthIndex = (currentWidthIndex + 1) % subtitlesWidthSequence.length;
                });
            })();

            // Bind the state machine to the video's timeupdate and seeking events.
            $('#video').on('timeupdate', updatePlayerState);
            $('#video').on('seeking', updatePlayerState);

            // Listen for user-initiated playback rate changes to update the originalSpeed.
            $('#video').on('ratechange', function () {
                $('#videoPlaybackRate').text(`x${this.playbackRate.toFixed(1)}`);
            });

            $('#subtitleAdvance').on('click', function () {
                adjustSubtitleSyncOffset(-0.1);
            });

            $('#subtitleDelay').on('click', function () {
                adjustSubtitleSyncOffset(0.1);
            });

            updateSubtitleSyncStatus();
            updateRefreshCurrentSubtitleButtonState();

            $('#refreshCurrentSubtitle').on('click', function () {
                refreshCurrentSubtitle();
            });

            // 自定义键盘热键控制播放速度
            (function () {
                const video = document.getElementById('video');

                // 定义热键映射
                const hotkeys = {
                    "'": 0.5,  // 单引号：加速0.5
                    ";": -0.5,  // 分号：减速0.5
                    "[": -0.1,  // 左中括号：减速0.1
                    "]": 0.1,   // 右中括号：加速0.1
                    "\\": 1     // 反斜杠：恢复速度为1
                };

                // 键盘事件监听
                document.addEventListener('keydown', function (event) {
                    const key = event.key;

                    // 检查是否是我们需要处理的热键
                    if (hotkeys.hasOwnProperty(key)) {
                        event.preventDefault();  // 阻止默认行为
                        event.stopPropagation(); // 阻止事件传播

                        const currentSpeed = video.playbackRate;
                        let newSpeed;

                        if (key === "\\") {
                            // 反斜杠直接恢复为1倍速
                            newSpeed = 1;
                        } else {
                            // 其他键在当前速度基础上增减
                            newSpeed = currentSpeed + hotkeys[key];

                            // 限制速度范围（防止过快或过慢）
                            newSpeed = Math.max(0.1, Math.min(16, newSpeed));
                        }

                        // 应用新速度
                        video.playbackRate = newSpeed;

                        // 更新显示
                        $('#videoPlaybackRate').text(`x${newSpeed.toFixed(1)}`);

                        // 可选：显示速度变化提示
                        // showSpeedChangeNotification(newSpeed);
                    }
                });

                // 显示速度变化提示
                function showSpeedChangeNotification(speed) {
                    // 创建或获取提示元素
                    let notification = document.getElementById('speed-notification');
                    if (!notification) {
                        notification = document.createElement('div');
                        notification.id = 'speed-notification';
                        notification.style.cssText = `
                            position: fixed;
                            top: 50%;
                            left: 50%;
                            transform: translate(-50%, -50%);
                            background: rgba(0, 0, 0, 0.8);
                            color: white;
                            padding: 10px 20px;
                            border-radius: 5px;
                            font-size: 24px;
                            font-weight: bold;
                            z-index: 10000;
                            pointer-events: none;
                            transition: opacity 0.3s ease;
                        `;
                        document.body.appendChild(notification);
                    }

                    // 显示速度
                    notification.textContent = `速度: x${speed.toFixed(1)}`;
                    notification.style.opacity = '1';

                    // 2秒后淡出
                    clearTimeout(notification.hideTimeout);
                    notification.hideTimeout = setTimeout(() => {
                        notification.style.opacity = '0';
                    }, 2000);
                }
            })()


        });
    </script>
