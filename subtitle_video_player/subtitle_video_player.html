            // STATE MACHINE REFACTOR
            const PLAYER_STATE = {
                NORMAL: 'NORMAL',
                FAST_FORWARDING: 'FAST_FORWARDING',
                RESTORING: 'RESTORING'
            };

            var playerState = {
                currentState: PLAYER_STATE.NORMAL,
                originalSpeed: 1,
                targetTime: 0,
                needCalibration: false,
                skipCalibrationBySubClick: false
            };

            function checkIsDuringSubtitle(currentTime) {
                currentTime = getSubtitleTimelineTime(currentTime);
                const skipIntervalChecked = $('#enableSkipInterval').prop('checked');
                const skipInterval = parseFloat(document.getElementById('skipInterval').value);
                const sentenceExtensionChecked = $('#enableSentenceExtension').prop('checked');
                const sentenceExtension = parseFloat(document.getElementById('sentenceExtension').value);

                return subtitles.some(sub => {
                    if (skipIntervalChecked) {
                        return sub.start <= currentTime && (sub.end < sub.start + skipInterval ? sub.end : sub.start + skipInterval) > currentTime;
                    } else if (sentenceExtensionChecked) {
                        return accTime(sub.start - sentenceExtension) <= currentTime && accTime(sub.end + sentenceExtension) > currentTime;
                    } else {
                        return sub.start <= currentTime && sub.end > currentTime;
                    }
                });
            }

            function calculateFastForwardSpeed(duration, originalSpeed) {
                let fastForwardSpeed = 8;
                for (let s = 2; s < 8; s++) {
                    if (duration <= s * 2) {
                        fastForwardSpeed = s;
                        break;
                    }
                }
                if (originalSpeed > 1) {
                    fastForwardSpeed *= originalSpeed;
                }
                // Add a cap to prevent the browser from throwing an error
                if (fastForwardSpeed > 16) {
                    fastForwardSpeed = 16;
                }
                return fastForwardSpeed;
            }

            function fastForwardCheckLoop() {
                // 2. FAST_FORWARDING State: Monitor playback and transition to RESTORING when target reached or subtitle detected
                if (playerState.currentState !== PLAYER_STATE.FAST_FORWARDING) {
                    return; // Stop the loop if we are no longer in fast-forwarding state
                }

                const video = $('#video')[0];
                const currentTime = accTime(video.currentTime);
                const isDuringSubtitle = checkIsDuringSubtitle(currentTime);

                if (currentTime >= playerState.targetTime || isDuringSubtitle) {
                    playerState.currentState = PLAYER_STATE.RESTORING;
                    updatePlayerState(); // Immediately call updatePlayerState to apply restoration without waiting for the next timeupdate tick.
                } else {
                    requestAnimationFrame(fastForwardCheckLoop); // Continue the loop
                }
            }

            // 更新播放速率显示颜色
            function updateVideoPlaybackRateColor(color) {
                const element = document.getElementById('videoPlaybackRate');
                element.style.color = color;
            }

            function updatePlayerState() {
                const video = $('#video')[0];
                const currentTime = accTime(video.currentTime);

                // --- STATE MACHINE ---

                // 1. NORMAL State: Check if we need to start fast forwarding
                if (playerState.currentState === PLAYER_STATE.NORMAL) {
                    playerState.originalSpeed = video.playbackRate; // Original speed could only be record in normal state

                    if (playerState.skipCalibrationBySubClick) {
                        playerState.skipCalibrationBySubClick = false;
                    }

                    const skipBlanks = $('#skipBlanks').prop('checked');
                    if (skipBlanks) {
                        const isDuringSubtitle = checkIsDuringSubtitle(currentTime);
                        const subtitleTimelineTime = getSubtitleTimelineTime(currentTime);

                        if (!isDuringSubtitle) {
                            const nextSubtitle = subtitles.find(sub => sub.start > subtitleTimelineTime);
                            if (nextSubtitle) {
                                const sentenceExtensionChecked = $('#enableSentenceExtension').prop('checked');
                                const sentenceExtension = parseFloat(document.getElementById('sentenceExtension').value);
                                const targetTime = sentenceExtensionChecked ? getShiftedSubtitleTime(nextSubtitle.start - sentenceExtension) : getShiftedSubtitleTime(nextSubtitle.start);
                                const duration = targetTime - currentTime;
                                const enableFFMode = $('#enableFFMode').prop('checked');

                                if (enableFFMode) {
                                    if (duration > 1) {
                                        playerState.targetTime = targetTime;
                                        playerState.needCalibration = $('#FFWithoutCalibration').prop('checked') ? false : duration > 3;
                                        playerState.currentState = PLAYER_STATE.FAST_FORWARDING;

                                        video.playbackRate = calculateFastForwardSpeed(duration, playerState.originalSpeed);
                                        $('#ff-sign').removeClass('hide-element');

                                        // 更新播放速率显示颜色为红紫色（快进状态）
                                        updateVideoPlaybackRateColor('#C94AFF');

                                        // Start the high-frequency check loop
                                        requestAnimationFrame(fastForwardCheckLoop);
                                    }
                                } else {
                                    video.currentTime = targetTime;
                                }
                            } else {
                                // Handle blank space at the end of the video
                                const enableFFMode = $('#enableFFMode').prop('checked');
                                if (enableFFMode) {
                                    const duration = video.duration - currentTime;
                                    if (duration > 1) {
                                        playerState.targetTime = video.duration;
                                        playerState.currentState = PLAYER_STATE.FAST_FORWARDING;
                                        video.playbackRate = calculateFastForwardSpeed(duration, playerState.originalSpeed);
                                        $('#ff-sign').removeClass('hide-element');

                                        // Start the high-frequency check loop
                                        requestAnimationFrame(fastForwardCheckLoop);
                                    }
                                } else {
                                    video.currentTime = video.duration;
                                    video.pause();
                                    $('#skipBlanks').trigger('click');
                                    setTimeout(() => {
                                        $('#skipBlanks').trigger('click');
                                    }, 1000);
                                }
                            }
                        }
                    }
                } else if (playerState.currentState === PLAYER_STATE.RESTORING) {
                    // 3. RESTORING State: Restore speed and return to NORMAL
                    if (video.playbackRate == playerState.originalSpeed) {
                        playerState.currentState = PLAYER_STATE.NORMAL;
                    }
                    video.playbackRate = playerState.originalSpeed;
                    $('#ff-sign').addClass('hide-element');
                    // 恢复播放速率显示颜色为蓝色（正常状态）
                    updateVideoPlaybackRateColor('#3F51B5');
                    if (playerState.needCalibration && !playerState.skipCalibrationBySubClick) {
                        video.currentTime = playerState.targetTime;
                    }
                }

                // --- UI UPDATES ---
                highlightSubtitle();
            }



            function loadSubtitlesImpl(triggeredFromSentenceLength = false) {
                subtitles = [];
                // Combine short subtitles
                let minLength = parseInt(document.getElementById("textLength").value, 10);
                var i = 0;
                while (i < tempSubtitles.length) {
                    var text = tempSubtitles[i].text;
                    var start = tempSubtitles[i].start;
                    var end = tempSubtitles[i].end;

                    function whileCondition(i) {
                        if (triggeredFromSentenceLength) {
                            return text.length < minLength;
                        }

                        var checked = $('#enableTimeConcat').prop('checked');
                        if (checked) {
                            var timeConcat = parseFloat(document.getElementById('timeConcat').value);
                            if (isNaN(timeConcat)) {
                                return false;
                            }
                            var adjacent = tempSubtitles[i + 1].start - end < timeConcat;
                            return adjacent;
                        }

                        return text.length < minLength;
                    }

                    while (i + 1 < tempSubtitles.length && whileCondition(i)) {
                        i++;
                        text += "，" + tempSubtitles[i].text;
                        end = tempSubtitles[i].end;
                    }
                    // text += "。"
                    subtitles.push({ start: start, end: end, text: text });
                    $('#subtitles').append('<div class="subtitle" data-index="' + (subtitles.length - 1) + '">' + text + '</div>');
                    i++;
                }

                // Set up event listener for clicking on subtitles
                $('.subtitle').click(function () {
                    var index = $(this).data('index');

                    playerState.skipCalibrationBySubClick = true;

                    $('#video')[0].currentTime = getShiftedSubtitleTime(subtitles[index].start);
                    if ($('#clickToPlay').prop('checked')) {
                        $('#video')[0].play();
                    }
                    $('#video')[0].focus();
                });
                refreshLayout();
            }

            function loadSubtitles(file, formatIsAss = false) {
                return new Promise((resolve, reject) => {
                    clearAllSub()
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        // Parse SRT file
                        var data = e.target.result;
                        if (formatIsAss) {
                            data = ass2srt(data)
                        }
                        var lines = data.split('\n');

                        tempSubtitles = []; // Store unprocessed subtitles

                        for (var i = 0; i < lines.length; i++) {
                            if (lines[i].indexOf('-->') !== -1) {
                                var times = lines[i].split(' --> ');
                                var start = hmsToSeconds(times[0].trim());
                                var end = hmsToSeconds(times[1].trim());
                                var text = "";
                                for (var j = i + 1; j < lines.length; j++) {
                                    if (lines[j].trim() === "") {
                                        i = j;
                                        break;
                                    }
                                    text += lines[j] + "\n";
                                }
                                tempSubtitles.push({ start: accTime(start), end: accTime(end), text: text.trim() });
                            }
                        }

                        loadSubtitlesImpl()
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            function hmsToSeconds(time) {
                time = time.replace('.', ',');
                var parts = time.split(':');
                var secondsParts = parts[2].split(",");
                var hours = parseInt(parts[0], 10);
                var minutes = parseInt(parts[1], 10);
                var seconds = parseInt(secondsParts[0], 10);
                var milliseconds = parseInt(secondsParts[1], 10);
                return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
            }

            var dufsTreeState = null;
            var dufsTreeCache = {};
            var dufsTreeFilterCache = {};
            var dufsTreeInflight = {};
            var dufsTreeRefreshSeq = 0;
            var dufsTreeActiveBaseUrl = '';
            var DUFS_DIRECTORY_FETCH_TIMEOUT_MS = 120000;
            var DUFS_URL_HISTORY_STORAGE_KEY = 'svp.dufsUrlHistory.v1';
            var DUFS_URL_HISTORY_LIMIT = 20;
            var dufsUrlHistory = [];
            var dufsUrlHistoryActiveIndex = -1;

            function createDufsTreeState(baseUrl, root, errors) {
                return {
                    baseUrl: baseUrl,
                    root: root,
                    errors: errors || 0,
                    nodeElements: {},
                    filterText: getDufsCachedTreeFilter(baseUrl),
                    filterMatcher: null,
                    filterFallback: false,
                    filterView: null,
                    filterManualCollapsedKeys: {}
                };
            }

            function readDufsUrlHistory() {
                try {
                    var raw = localStorage.getItem(DUFS_URL_HISTORY_STORAGE_KEY);
                    var parsed = raw ? JSON.parse(raw) : [];
                    if (!Array.isArray(parsed)) return [];
                    return parsed
                        .filter(function (item) {
                            return item && typeof item.url === 'string' && item.url;
                        })
                        .map(function (item) {
                            return {
                                url: item.url,
                                lastUsedAt: Number(item.lastUsedAt) || 0,
                                useCount: Number(item.useCount) || 1
                            };
                        })
                        .sort(function (a, b) {
                            return b.lastUsedAt - a.lastUsedAt;
                        })
                        .slice(0, DUFS_URL_HISTORY_LIMIT);
                } catch (error) {
                    console.warn('DUFS URL history read failed:', error);
                    return [];
                }
            }

            function writeDufsUrlHistory() {
                try {
                    localStorage.setItem(DUFS_URL_HISTORY_STORAGE_KEY, JSON.stringify(dufsUrlHistory.slice(0, DUFS_URL_HISTORY_LIMIT)));
                } catch (error) {
                    console.warn('DUFS URL history write failed:', error);
                }
            }

            function rememberDufsUrl(baseUrl) {
                if (!baseUrl) return;
                var now = Date.now();
                var found = null;
                dufsUrlHistory = dufsUrlHistory.filter(function (item) {
                    if (item.url === baseUrl) {
                        found = item;
                        return false;
                    }
                    return true;
                });
                dufsUrlHistory.unshift({
                    url: baseUrl,
                    lastUsedAt: now,
                    useCount: found ? found.useCount + 1 : 1
                });
                dufsUrlHistory = dufsUrlHistory.slice(0, DUFS_URL_HISTORY_LIMIT);
                writeDufsUrlHistory();
            }

            function getFilteredDufsUrlHistory(filterText) {
                var normalized = (filterText || '').trim().toLowerCase();
                if (!normalized) return dufsUrlHistory.slice(0, DUFS_URL_HISTORY_LIMIT);
                return dufsUrlHistory.filter(function (item) {
                    return item.url.toLowerCase().indexOf(normalized) !== -1;
                }).slice(0, DUFS_URL_HISTORY_LIMIT);
            }

            function hideDufsUrlHistory() {
                var list = document.getElementById('dufsUrlHistoryList');
                if (!list) return;
                list.classList.remove('visible');
                list.style.left = '';
                list.style.top = '';
                list.style.width = '';
                list.style.maxHeight = '';
                list.textContent = '';
                dufsUrlHistoryActiveIndex = -1;
            }

            function positionDufsUrlHistoryList() {
                var input = document.getElementById('dufsUrl');
                var list = document.getElementById('dufsUrlHistoryList');
                if (!input || !list || !list.classList.contains('visible')) return;

                var viewportPadding = 8;
                var viewportWidth = document.documentElement.clientWidth || window.innerWidth;
                var viewportHeight = document.documentElement.clientHeight || window.innerHeight;
                var maxWidth = Math.max(220, viewportWidth - viewportPadding * 2);
                var inputRect = input.getBoundingClientRect();
                list.style.width = '';
                list.style.maxHeight = '';

                if (list.offsetWidth > maxWidth) {
                    list.style.width = maxWidth + 'px';
                }

                var left = inputRect.left;
                var listRect = list.getBoundingClientRect();
                var listWidth = listRect.width;
                if (left + listWidth > viewportWidth - viewportPadding) {
                    left = viewportWidth - viewportPadding - listWidth;
                }
                if (left < viewportPadding) {
                    left = viewportPadding;
                }

                var top = inputRect.bottom + 4;
                var availableBelow = viewportHeight - top - viewportPadding;
                if (availableBelow < 80 && inputRect.top > viewportHeight - inputRect.bottom) {
                    var availableAbove = inputRect.top - viewportPadding - 4;
                    list.style.maxHeight = Math.max(80, availableAbove) + 'px';
                    top = Math.max(viewportPadding, inputRect.top - list.offsetHeight - 4);
                } else {
                    list.style.maxHeight = Math.max(80, availableBelow) + 'px';
                }

                list.style.left = Math.round(left) + 'px';
                list.style.top = Math.round(top) + 'px';
            }

            function setDufsUrlHistoryActiveIndex(index) {
                var list = document.getElementById('dufsUrlHistoryList');
                if (!list) return;
                var items = Array.from(list.querySelectorAll('.dufs-url-history-item'));
                if (!items.length) {
                    dufsUrlHistoryActiveIndex = -1;
                    return;
                }
                dufsUrlHistoryActiveIndex = (index + items.length) % items.length;
                items.forEach(function (item, itemIndex) {
                    item.classList.toggle('active', itemIndex === dufsUrlHistoryActiveIndex);
                });
                items[dufsUrlHistoryActiveIndex].scrollIntoView({ block: 'nearest' });
            }

            function selectDufsUrlHistoryItem(url) {
                var input = document.getElementById('dufsUrl');
                if (!input) return;
                input.value = url;
                input.focus();
                hideDufsUrlHistory();
            }

            function removeDufsUrlHistoryItem(url) {
                var input = document.getElementById('dufsUrl');
                dufsUrlHistory = dufsUrlHistory.filter(function (item) {
                    return item.url !== url;
                });
                writeDufsUrlHistory();
                if (input && input.value === url) {
                    input.value = dufsUrlHistory.length ? dufsUrlHistory[0].url : '';
                }
                showDufsUrlHistory();
            }

            function showDufsUrlHistory(options) {
                options = options || {};
                var input = document.getElementById('dufsUrl');
                var list = document.getElementById('dufsUrlHistoryList');
                if (!input || !list) return;
                var history = options.filter ? getFilteredDufsUrlHistory(input.value) : dufsUrlHistory.slice(0, DUFS_URL_HISTORY_LIMIT);
                list.textContent = '';
                dufsUrlHistoryActiveIndex = -1;
                if (!history.length) {
                    hideDufsUrlHistory();
                    return;
                }
                history.forEach(function (item) {
                    var button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'dufs-url-history-item';
                    button.title = item.url;
                    button.addEventListener('mousedown', function (event) {
                        event.preventDefault();
                    });
                    button.addEventListener('click', function () {
                        selectDufsUrlHistoryItem(item.url);
                    });
                    var text = document.createElement('span');
                    text.className = 'dufs-url-history-text';
                    text.textContent = item.url;
                    button.appendChild(text);

                    var remove = document.createElement('span');
                    remove.className = 'dufs-url-history-remove';
                    remove.textContent = '×';
                    remove.title = '删除这条历史';
                    remove.addEventListener('mousedown', function (event) {
                        event.preventDefault();
                        event.stopPropagation();
                    });
                    remove.addEventListener('click', function (event) {
                        event.preventDefault();
                        event.stopPropagation();
                        removeDufsUrlHistoryItem(item.url);
                    });
                    button.appendChild(remove);
                    list.appendChild(button);
                });
                list.classList.add('visible');
                positionDufsUrlHistoryList();
            }

            function initDufsUrlHistory() {
                var input = document.getElementById('dufsUrl');
                if (!input) return;
                dufsUrlHistory = readDufsUrlHistory();
                if (!input.value && dufsUrlHistory.length) {
                    input.value = dufsUrlHistory[0].url;
                }
                input.addEventListener('focus', function () {
                    showDufsUrlHistory();
                });
                input.addEventListener('input', function () {
                    showDufsUrlHistory({ filter: true });
                });
                window.addEventListener('resize', positionDufsUrlHistoryList);
                window.addEventListener('scroll', positionDufsUrlHistoryList, { passive: true });
                input.addEventListener('keydown', function (event) {
                    var list = document.getElementById('dufsUrlHistoryList');
                    var isVisible = list && list.classList.contains('visible');
                    if (event.key === 'ArrowDown') {
                        if (!isVisible) {
                            showDufsUrlHistory();
                        }
                        setDufsUrlHistoryActiveIndex(dufsUrlHistoryActiveIndex + 1);
                        event.preventDefault();
                    } else if (event.key === 'ArrowUp' && isVisible) {
                        setDufsUrlHistoryActiveIndex(dufsUrlHistoryActiveIndex - 1);
                        event.preventDefault();
                    } else if (event.key === 'Enter' && isVisible && dufsUrlHistoryActiveIndex >= 0) {
                        var items = Array.from(list.querySelectorAll('.dufs-url-history-item'));
                        if (items[dufsUrlHistoryActiveIndex]) {
                            var text = items[dufsUrlHistoryActiveIndex].querySelector('.dufs-url-history-text');
                            selectDufsUrlHistoryItem(text ? text.textContent : items[dufsUrlHistoryActiveIndex].textContent);
                            event.preventDefault();
                        }
                    } else if (event.key === 'Escape' && isVisible) {
                        hideDufsUrlHistory();
                        event.preventDefault();
                    }
                });
                document.addEventListener('click', function (event) {
                    var wrapper = input.closest('.dufs-url-history-wrapper');
                    if (wrapper && !wrapper.contains(event.target)) {
                        hideDufsUrlHistory();
                    }
                });
            }

            function getDufsNodeKey(node) {
                return node && node.path ? node.path : '__root__';
            }

            function getDufsCachedTree(baseUrl) {
                return dufsTreeCache[baseUrl] || null;
            }

            function setDufsCachedTree(baseUrl, root, errors) {
                dufsTreeCache[baseUrl] = {
                    root: root,
                    errors: errors || 0,
                    updatedAt: Date.now()
                };
            }

            function getDufsCachedTreeFilter(baseUrl) {
                return dufsTreeFilterCache[baseUrl] || '';
            }

            function setDufsCachedTreeFilter(baseUrl, filterText) {
                if (!baseUrl) return;
                dufsTreeFilterCache[baseUrl] = filterText || '';
            }

            function resetDufsTreeCheckedState(node) {
                if (!node) return;
                node.checked = false;
                node.indeterminate = false;
                (node.children || []).forEach(resetDufsTreeCheckedState);
            }

            function isDufsFileListModalVisible() {
                var modal = document.getElementById('modalOverlay');
                return modal && window.getComputedStyle(modal).display !== 'none';
            }

            function showDufsFileListModal(baseUrl) {
                dufsTreeActiveBaseUrl = baseUrl;
                setFocusRegressionBlocker(FOCUS_BLOCKER_DUFS_FILE_LIST, true);
                document.getElementById('modalOverlay').style.display = 'block';
            }

            function hideDufsFileListModal() {
                document.getElementById('modalOverlay').style.display = 'none';
                dufsTreeActiveBaseUrl = '';
                dufsTreeRefreshSeq++;
                setFocusRegressionBlocker(FOCUS_BLOCKER_DUFS_FILE_LIST, false);
            }

            function cacheDufsTreeSnapshot(baseUrl, snapshot) {
                if (!snapshot || !snapshot.root) return;
                setDufsCachedTree(baseUrl, snapshot.root, snapshot.errors);
                if (!isDufsFileListModalVisible() && dufsTreeState && dufsTreeState.baseUrl === baseUrl) {
                    dufsTreeState = null;
                }
            }

            function registerDufsNodeDom(node, dom) {
                node.dom = dom;
                if (!dufsTreeState || !dufsTreeState.nodeElements) return;
                var key = getDufsNodeKey(node);
                dom.row.dataset.dufsNodeKey = key;
                dufsTreeState.nodeElements[key] = node;
            }

            function unregisterDufsNodeDom(node) {
                if (!node) return;
                (node.children || []).forEach(unregisterDufsNodeDom);
                if (dufsTreeState && dufsTreeState.nodeElements) {
                    delete dufsTreeState.nodeElements[getDufsNodeKey(node)];
                }
                if (node.dom && node.dom.li && node.dom.li.parentNode) {
                    node.dom.li.parentNode.removeChild(node.dom.li);
                }
                node.dom = null;
            }

            function captureDufsScrollAnchor() {
                var fileList = document.getElementById('fileList');
                if (!fileList) return null;
                var listRect = fileList.getBoundingClientRect();
                var rows = fileList.querySelectorAll('.dufs-tree-row');
                for (var i = 0; i < rows.length; i++) {
                    var rowRect = rows[i].getBoundingClientRect();
                    if (rowRect.bottom >= listRect.top) {
                        return {
                            key: rows[i].dataset.dufsNodeKey,
                            offset: rowRect.top - listRect.top,
                            scrollTop: fileList.scrollTop
                        };
                    }
                }
                return { scrollTop: fileList.scrollTop };
            }

            function restoreDufsScrollAnchor(anchor) {
                var fileList = document.getElementById('fileList');
                if (!fileList || !anchor) return;
                if (anchor.key && dufsTreeState && dufsTreeState.nodeElements && dufsTreeState.nodeElements[anchor.key]) {
                    var node = dufsTreeState.nodeElements[anchor.key];
                    if (node.dom && node.dom.row) {
                        var listRect = fileList.getBoundingClientRect();
                        var rowRect = node.dom.row.getBoundingClientRect();
                        fileList.scrollTop += rowRect.top - listRect.top - anchor.offset;
                        return;
                    }
                }
                if (typeof anchor.scrollTop === 'number') {
                    fileList.scrollTop = anchor.scrollTop;
                }
            }

            function isDufsLoadableName(name) {
                var lowerName = (name || '').toLowerCase();
                return lowerName.endsWith('.mp4') ||
                    lowerName.endsWith('.webm') ||
                    lowerName.endsWith('.json') ||
                    lowerName.endsWith('.srt') ||
                    lowerName.endsWith('.ass') ||
                    lowerName.endsWith('.html') ||
                    lowerName.endsWith('.sup') ||
                    isDufsImageName(lowerName);
            }

            function isDufsImageName(name) {
                var lowerName = (name || '').toLowerCase();
                return lowerName.endsWith('.jpg') ||
                    lowerName.endsWith('.jpeg') ||
                    lowerName.endsWith('.png') ||
                    lowerName.endsWith('.webp') ||
                    lowerName.endsWith('.gif') ||
                    lowerName.endsWith('.bmp');
            }

            function isDufsDirectoryItem(item) {
                return item && typeof item.path_type === 'string' && item.path_type.endsWith('Dir');
            }

            function getDufsDisplayName(path) {
                var normalized = (path || '').replace(/\/+$/, '');
                var parts = normalized.split('/');
                return parts[parts.length - 1] || normalized || '主目录';
            }

            function decodeDufsSimpleName(name) {
                var textarea = document.createElement('textarea');
                textarea.innerHTML = name;
                return textarea.value;
            }

            function normalizeDufsItemName(name) {
                return (name || '').replace(/^\/+/, '').replace(/\/+$/, '');
            }

            function joinDufsRelativePath(parentPath, childName) {
                var cleanParent = normalizeDufsItemName(parentPath);
                var cleanChild = normalizeDufsItemName(childName);
                if (!cleanParent) return cleanChild;
                if (!cleanChild) return cleanParent;
                return cleanParent + '/' + cleanChild;
            }

            function getDufsChildPath(parentPath, itemName) {
                var cleanParent = normalizeDufsItemName(parentPath);
                var cleanName = normalizeDufsItemName(itemName);
                if (!cleanParent || cleanName.indexOf(cleanParent + '/') === 0) {
                    return cleanName;
                }
                return joinDufsRelativePath(cleanParent, cleanName);
            }

            function encodeDufsRelativePath(relativePath) {
                return normalizeDufsItemName(relativePath)
                    .split('/')
                    .filter(function (segment) { return segment !== ''; })
                    .map(function (segment) { return encodeURIComponent(segment); })
                    .join('/');
            }

            function getDufsDirectoryUrl(baseUrl, relativePath) {
                var encodedPath = encodeDufsRelativePath(relativePath);
                if (!encodedPath) return baseUrl;
                return baseUrl + encodedPath + '/';
            }

            function getDufsFileUrl(baseUrl, relativePath) {
                var encodedPath = encodeDufsRelativePath(relativePath);
                return baseUrl + encodedPath;
            }

            function updateDufsTreeStatus(text) {
                document.getElementById('dufsTreeStatus').textContent = text || '';
            }

            function getDufsTreeFilterInput() {
                return document.getElementById('dufsTreeFilter');
            }

            function getDufsTreeFilterClearButton() {
                return document.getElementById('clearDufsTreeFilter');
            }

            function escapeDufsRegExpText(text) {
                return String(text || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function createDufsFilterMatcher(filterText) {
                var rawText = String(filterText || '');
                var normalized = rawText.trim();
                if (!normalized) {
                    return null;
                }
                try {
                    var regex = new RegExp(normalized, 'i');
                    return {
                        fallback: false,
                        test: function (text) {
                            regex.lastIndex = 0;
                            return regex.test(text || '');
                        }
                    };
                } catch (error) {
                    var escapedText = escapeDufsRegExpText(normalized);
                    var textRegex = new RegExp(escapedText, 'i');
                    return {
                        fallback: true,
                        test: function (text) {
                            textRegex.lastIndex = 0;
                            return textRegex.test(text || '');
                        }
                    };
                }
            }

            function getDufsNodeSearchText(node) {
                if (!node) return '';
                return node.path || node.name || '';
            }

            function hasActiveDufsTreeFilter() {
                return !!(dufsTreeState && dufsTreeState.filterView && dufsTreeState.filterView.active);
            }

            function isDufsNodeVisibleInFilter(node) {
                if (!node) return false;
                if (!hasActiveDufsTreeFilter()) return true;
                return !!dufsTreeState.filterView.visibleKeys[getDufsNodeKey(node)];
            }

            function isDufsNodeAutoExpandedInFilter(node) {
                if (!node || !hasActiveDufsTreeFilter()) return false;
                return !!dufsTreeState.filterView.autoExpandKeys[getDufsNodeKey(node)];
            }

            function getDufsRenderableChildren(node) {
                var children = node && node.children ? node.children : [];
                if (!hasActiveDufsTreeFilter()) return children;
                return children.filter(isDufsNodeVisibleInFilter);
            }

            function updateDufsTreeFilterControl() {
                var input = getDufsTreeFilterInput();
                var clearButton = getDufsTreeFilterClearButton();
                var filterText = dufsTreeState ? dufsTreeState.filterText || '' : getDufsCachedTreeFilter(dufsTreeActiveBaseUrl);
                var fallback = !!(dufsTreeState && dufsTreeState.filterFallback);
                if (input) {
                    if (input.value !== filterText) {
                        input.value = filterText;
                    }
                    input.classList.toggle('dufs-filter-fallback', fallback);
                    input.title = fallback ? '正则暂不可用，已按普通文本筛选' : '';
                }
                if (clearButton) {
                    clearButton.classList.toggle('visible', !!filterText);
                }
            }

            function prepareDufsTreeFilterView() {
                if (!dufsTreeState || !dufsTreeState.root) return;
                var matcher = createDufsFilterMatcher(dufsTreeState.filterText);
                dufsTreeState.filterMatcher = matcher;
                dufsTreeState.filterFallback = !!(matcher && matcher.fallback);
                if (!matcher) {
                    dufsTreeState.filterView = null;
                    dufsTreeState.filterManualCollapsedKeys = {};
                    updateDufsTreeFilterControl();
                    return;
                }

                var view = {
                    active: true,
                    visibleKeys: {},
                    autoExpandKeys: {},
                    visibleFileCount: 0,
                    visibleCheckedFileCount: 0
                };

                function markWholeSubtree(node) {
                    var key = getDufsNodeKey(node);
                    view.visibleKeys[key] = true;
                    if (node.type === 'file') {
                        view.visibleFileCount++;
                        if (node.checked) {
                            view.visibleCheckedFileCount++;
                        }
                        return;
                    }
                    view.autoExpandKeys[key] = true;
                    (node.children || []).forEach(markWholeSubtree);
                }

                function visit(node) {
                    var key = getDufsNodeKey(node);
                    var matched = matcher.test(getDufsNodeSearchText(node));
                    if (matched) {
                        markWholeSubtree(node);
                        return true;
                    }
                    if (node.type === 'file') {
                        return false;
                    }
                    var childVisible = false;
                    (node.children || []).forEach(function (child) {
                        childVisible = visit(child) || childVisible;
                    });
                    if (childVisible || !node.parent) {
                        view.visibleKeys[key] = true;
                        if (childVisible) {
                            view.autoExpandKeys[key] = true;
                        }
                        return true;
                    }
                    return false;
                }

                visit(dufsTreeState.root);
                dufsTreeState.filterView = view;
                updateDufsTreeFilterControl();
            }

            function getDufsNodeEffectiveExpanded(node) {
                if (!node || node.type !== 'dir') return false;
                if (!hasActiveDufsTreeFilter()) return !!node.expanded;
                var key = getDufsNodeKey(node);
                if (dufsTreeState.filterManualCollapsedKeys && dufsTreeState.filterManualCollapsedKeys[key]) {
                    return false;
                }
                return !!node.expanded || isDufsNodeAutoExpandedInFilter(node);
            }

            function toggleDufsNodeExpanded(node) {
                if (!node || node.type !== 'dir') return;
                var key = getDufsNodeKey(node);
                var expanded = getDufsNodeEffectiveExpanded(node);
                if (hasActiveDufsTreeFilter()) {
                    if (expanded) {
                        node.expanded = false;
                        dufsTreeState.filterManualCollapsedKeys[key] = true;
                    } else {
                        node.expanded = true;
                        delete dufsTreeState.filterManualCollapsedKeys[key];
                    }
                } else {
                    node.expanded = !node.expanded;
                }
                updateDufsTreeRowDom(node);
            }

            function countDufsFiles(node, checkedOnly) {
                if (!node) return 0;
                if (node.type === 'file') {
                    return !checkedOnly || node.checked ? 1 : 0;
                }
                return (node.children || []).reduce(function (sum, child) {
                    return sum + countDufsFiles(child, checkedOnly);
                }, 0);
            }

            function countDufsVisibleFiles(node, checkedOnly) {
                if (!node) return 0;
                if (!hasActiveDufsTreeFilter()) {
                    return countDufsFiles(node, checkedOnly);
                }
                if (!isDufsNodeVisibleInFilter(node)) return 0;
                if (node.type === 'file') {
                    return !checkedOnly || node.checked ? 1 : 0;
                }
                return (node.children || []).reduce(function (sum, child) {
                    return sum + countDufsVisibleFiles(child, checkedOnly);
                }, 0);
            }

            function collectDufsCheckedFiles(node, files) {
                if (!node) return files;
                if (node.type === 'file') {
                    if (node.checked) {
                        files.push({
                            value: node.path,
                            displayName: node.path
                        });
                    }
                    return files;
                }
                (node.children || []).forEach(function (child) {
                    collectDufsCheckedFiles(child, files);
                });
                return files;
            }

            function getDufsNodeDisplayCheckState(node) {
                if (!node) {
                    return {
                        checked: false,
                        indeterminate: false,
                        disabled: true
                    };
                }
                if (node.type === 'file') {
                    return {
                        checked: !!node.checked,
                        indeterminate: false,
                        disabled: false
                    };
                }
                var fileCount = hasActiveDufsTreeFilter() ? countDufsVisibleFiles(node, false) : countDufsFiles(node, false);
                var checkedCount = hasActiveDufsTreeFilter() ? countDufsVisibleFiles(node, true) : countDufsFiles(node, true);
                return {
                    checked: fileCount > 0 && checkedCount === fileCount,
                    indeterminate: checkedCount > 0 && checkedCount < fileCount,
                    disabled: fileCount === 0
                };
            }

            function refreshDufsNodeCheckState(node) {
                if (!node || node.type !== 'dir') return;
                var fileCount = 0;
                var checkedCount = 0;
                (node.children || []).forEach(function (child) {
                    if (child.type === 'dir') refreshDufsNodeCheckState(child);
                    fileCount += countDufsFiles(child, false);
                    checkedCount += countDufsFiles(child, true);
                });
                node.checked = fileCount > 0 && checkedCount === fileCount;
                node.indeterminate = checkedCount > 0 && checkedCount < fileCount;
            }

            function refreshDufsTreeCheckState() {
                if (dufsTreeState && dufsTreeState.root) {
                    refreshDufsNodeCheckState(dufsTreeState.root);
                }
            }

            function setDufsNodeChecked(node, checked) {
                if (!node) return;
                if (node.type === 'file') {
                    node.checked = checked;
                    return;
                }
                (node.children || []).forEach(function (child) {
                    setDufsNodeChecked(child, checked);
                });
                refreshDufsNodeCheckState(node);
            }

            function setDufsVisibleNodeChecked(node, checked) {
                if (!node) return;
                if (!hasActiveDufsTreeFilter()) {
                    setDufsNodeChecked(node, checked);
                    return;
                }
                if (!isDufsNodeVisibleInFilter(node)) return;
                if (node.type === 'file') {
                    node.checked = checked;
                    return;
                }
                (node.children || []).forEach(function (child) {
                    setDufsVisibleNodeChecked(child, checked);
                });
            }

            function setDufsExpanded(node, expanded, keepRootOpen) {
                if (!node || node.type !== 'dir') return;
                if (!keepRootOpen || node.parent) {
                    node.expanded = expanded;
                }
                (node.children || []).forEach(function (child) {
                    setDufsExpanded(child, expanded, keepRootOpen);
                });
            }

            function updateDufsTreeSelectionStatus() {
                if (!dufsTreeState || !dufsTreeState.root) return;
                var total = countDufsFiles(dufsTreeState.root, false);
                var checked = countDufsFiles(dufsTreeState.root, true);
                var filterText = (dufsTreeState.filterText || '').trim();
                var filterTextPart = '';
                if (filterText && hasActiveDufsTreeFilter()) {
                    var visibleTotal = dufsTreeState.filterView.visibleFileCount;
                    var visibleChecked = dufsTreeState.filterView.visibleCheckedFileCount;
                    filterTextPart = '，筛选显示 ' + visibleTotal + ' 个，当前可见已选 ' + visibleChecked;
                }
                var errorText = dufsTreeState.errors > 0 ? '，' + dufsTreeState.errors + ' 个目录读取失败' : '';
                updateDufsTreeStatus('共 ' + total + ' 个可加载文件，已选 ' + checked + filterTextPart + errorText);
            }

            function sortDufsNodes(nodes) {
                nodes.sort(function (a, b) {
                    if (a.type !== b.type) {
                        return a.type === 'dir' ? -1 : 1;
                    }
                    return a.name.localeCompare(b.name, 'zh-Hans-CN', { numeric: true });
                });
                nodes.forEach(function (node) {
                    if (node.type === 'dir') sortDufsNodes(node.children || []);
                });
            }

            function findDufsInsertBefore(parentNode, node, siblings, index) {
                for (var i = index + 1; i < siblings.length; i++) {
                    if (siblings[i].dom && siblings[i].dom.li && siblings[i].dom.li.parentNode === parentNode) {
                        return siblings[i].dom.li;
                    }
                }
                return null;
            }

            function updateDufsTreeContainerClasses(node) {
                if (!node || !node.dom || !node.dom.li) return;
                if (node.type === 'dir' && !getDufsNodeEffectiveExpanded(node)) {
                    node.dom.li.classList.add('dufs-collapsed');
                } else {
                    node.dom.li.classList.remove('dufs-collapsed');
                }
            }

            function updateDufsTreeRowDom(node) {
                if (!node || !node.dom) return;
                var dom = node.dom;
                updateDufsTreeContainerClasses(node);
                var checkState = getDufsNodeDisplayCheckState(node);
                dom.checkbox.checked = checkState.checked;
                dom.checkbox.indeterminate = checkState.indeterminate;
                dom.checkbox.disabled = checkState.disabled;
                if (node.type === 'file') {
                    dom.checkbox.value = node.path;
                    dom.checkbox.dataset.displayName = node.path;
                }
                if (dom.name) {
                    dom.name.textContent = node.type === 'dir' ? node.name + '/' : node.name;
                    dom.name.title = node.path || node.name;
                }
                if (dom.icon) {
                    var nextIcon = createDufsNodeIcon(node);
                    dom.icon.replaceWith(nextIcon);
                    dom.icon = nextIcon;
                }
                if (dom.toggle) {
                    dom.toggle.title = getDufsNodeEffectiveExpanded(node) ? '折叠' : '展开';
                    dom.toggle.textContent = '';
                    dom.toggle.appendChild(createDufsToggleIcon(getDufsNodeEffectiveExpanded(node)));
                }
            }

            function updateDufsEmptyState(node) {
                if (!node || node.type !== 'dir' || !node.dom || !node.dom.childList) return;
                if (node.dom.errorItem) {
                    node.dom.errorItem.remove();
                    node.dom.errorItem = null;
                }
                if (node.dom.emptyItem) {
                    node.dom.emptyItem.remove();
                    node.dom.emptyItem = null;
                }
                if (node.error) {
                    var errorItem = document.createElement('li');
                    errorItem.className = 'dufs-error';
                    errorItem.textContent = '读取失败：' + node.error;
                    node.dom.childList.appendChild(errorItem);
                    node.dom.errorItem = errorItem;
                } else if (getDufsRenderableChildren(node).length === 0) {
                    var emptyItem = document.createElement('li');
                    emptyItem.className = 'dufs-empty';
                    emptyItem.textContent = hasActiveDufsTreeFilter() ? '没有匹配的文件' : '没有可加载文件';
                    node.dom.childList.appendChild(emptyItem);
                    node.dom.emptyItem = emptyItem;
                }
            }

            function syncDufsChildrenDom(node) {
                if (!node || node.type !== 'dir' || !node.dom || !node.dom.childList) return;
                if (node.dom.emptyItem) {
                    node.dom.emptyItem.remove();
                    node.dom.emptyItem = null;
                }
                if (node.dom.errorItem) {
                    node.dom.errorItem.remove();
                    node.dom.errorItem = null;
                }
                var renderableChildren = getDufsRenderableChildren(node);
                (node.children || []).forEach(function (child) {
                    if (renderableChildren.indexOf(child) === -1 && child.dom) {
                        unregisterDufsNodeDom(child);
                    }
                });
                renderableChildren.forEach(function (child, index, siblings) {
                    if (!child.dom) {
                        var childDom = renderDufsTreeNode(child);
                        node.dom.childList.insertBefore(childDom, findDufsInsertBefore(node.dom.childList, child, siblings, index));
                    } else if (child.dom.li.parentNode !== node.dom.childList) {
                        node.dom.childList.insertBefore(child.dom.li, findDufsInsertBefore(node.dom.childList, child, siblings, index));
                    }
                    updateDufsTreeRowDom(child);
                    syncDufsChildrenDom(child);
                });
                updateDufsEmptyState(node);
            }

            function createDufsTimeoutError() {
                var error = new Error('DUFS 请求超时（120 秒）');
                error.name = 'DufsTimeoutError';
                return error;
            }

            function isDufsTimeoutError(error) {
                return error && error.name === 'DufsTimeoutError';
            }

            async function fetchDufsDirectoryResource(url) {
                var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
                var timedOut = false;
                var timeoutId = null;
                var timeoutPromise = new Promise(function (_, reject) {
                    timeoutId = setTimeout(function () {
                        timedOut = true;
                        if (controller) {
                            controller.abort();
                        }
                        reject(createDufsTimeoutError());
                    }, DUFS_DIRECTORY_FETCH_TIMEOUT_MS);
                });
                try {
                    var fetchOptions = controller ? { signal: controller.signal } : undefined;
                    return await Promise.race([fetch(url, fetchOptions), timeoutPromise]);
                } catch (error) {
                    if (timedOut || error.name === 'AbortError') {
                        throw createDufsTimeoutError();
                    }
                    throw error;
                } finally {
                    clearTimeout(timeoutId);
                }
            }

            async function fetchDufsDirectoryEntries(baseUrl, relativePath) {
                var dirUrl = getDufsDirectoryUrl(baseUrl, relativePath);
                try {
                    var response = await fetchDufsDirectoryResource(dirUrl + '?json');
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    var data = await response.json();
                    if (data && Array.isArray(data.paths)) {
                        return data.paths;
                    }
                    throw new Error('DUFS JSON 中没有 paths 字段');
                } catch (jsonError) {
                    if (isDufsTimeoutError(jsonError)) {
                        throw jsonError;
                    }
                    var simpleResponse = await fetchDufsDirectoryResource(dirUrl + '?simple');
                    if (!simpleResponse.ok) {
                        throw jsonError;
                    }
                    var text = await simpleResponse.text();
                    return text.split('\n')
                        .map(function (line) { return line.trim(); })
                        .filter(Boolean)
                        .map(function (line) {
                            var isDir = line.endsWith('/');
                            return {
                                path_type: isDir ? 'Dir' : 'File',
                                name: decodeDufsSimpleName(line)
                            };
                        });
                }
            }

            async function loadDufsDirectory(baseUrl, node, stats, depth) {
                if (depth > 30) {
                    node.error = '目录层级超过 30 层，已停止继续递归';
                    stats.errors++;
                    return;
                }

                if (!stats.silent && stats.baseUrl === dufsTreeActiveBaseUrl && isDufsFileListModalVisible()) {
                    updateDufsTreeStatus('正在扫描：' + (node.path || '主目录') + '（目录 ' + stats.dirs + '，文件 ' + stats.files + '）');
                }
                var entries;
                try {
                    entries = await fetchDufsDirectoryEntries(baseUrl, node.path);
                } catch (error) {
                    node.error = error && error.message ? error.message : '读取失败';
                    stats.errors++;
                    return;
                }

                for (var i = 0; i < entries.length; i++) {
                    var entry = entries[i];
                    var itemName = normalizeDufsItemName(entry.name);
                    if (!itemName) continue;

                    var childPath = getDufsChildPath(node.path, itemName);
                    if (isDufsDirectoryItem(entry)) {
                        var childDir = {
                            type: 'dir',
                            name: getDufsDisplayName(itemName),
                            path: childPath,
                            children: [],
                            expanded: true,
                            checked: false,
                            indeterminate: false,
                            parent: node
                        };
                        node.children.push(childDir);
                        stats.dirs++;
                        await loadDufsDirectory(baseUrl, childDir, stats, depth + 1);
                    } else if (isDufsLoadableName(itemName)) {
                        node.children.push({
                            type: 'file',
                            name: getDufsDisplayName(itemName),
                            path: childPath,
                            checked: false,
                            parent: node
                        });
                        stats.files++;
                    }
                }
            }

            async function buildDufsTree(baseUrl, options) {
                options = options || {};
                var root = {
                    type: 'dir',
                    name: getDufsDisplayName(baseUrl),
                    path: '',
                    children: [],
                    expanded: true,
                    checked: false,
                    indeterminate: false,
                    parent: null
                };
                var stats = { dirs: 1, files: 0, errors: 0, silent: !!options.silent, baseUrl: baseUrl };
                await loadDufsDirectory(baseUrl, root, stats, 0);
                sortDufsNodes(root.children);
                return {
                    root: root,
                    errors: stats.errors
                };
            }

            function fetchDufsTreeSnapshot(baseUrl, options) {
                if (dufsTreeInflight[baseUrl]) {
                    return dufsTreeInflight[baseUrl];
                }
                var request = buildDufsTree(baseUrl, options).then(function (snapshot) {
                    if (snapshot && snapshot.root && snapshot.root.error) {
                        throw new Error(snapshot.root.error);
                    }
                    cacheDufsTreeSnapshot(baseUrl, snapshot);
                    return snapshot;
                });
                dufsTreeInflight[baseUrl] = request;
                request.then(function () {
                    if (dufsTreeInflight[baseUrl] === request) {
                        delete dufsTreeInflight[baseUrl];
                    }
                }, function () {
                    if (dufsTreeInflight[baseUrl] === request) {
                        delete dufsTreeInflight[baseUrl];
                    }
                });
                return request;
            }

            function mergeDufsNode(existing, incoming, parent) {
                existing.type = incoming.type;
                existing.name = incoming.name;
                existing.path = incoming.path;
                existing.error = incoming.error || null;
                existing.parent = parent || null;
                if (existing.type === 'file') {
                    existing.children = [];
                    return existing;
                }

                var existingByPath = {};
                (existing.children || []).forEach(function (child) {
                    existingByPath[getDufsNodeKey(child)] = child;
                });

                var mergedChildren = [];
                (incoming.children || []).forEach(function (incomingChild) {
                    var childKey = getDufsNodeKey(incomingChild);
                    var existingChild = existingByPath[childKey];
                    if (existingChild && existingChild.type === incomingChild.type) {
                        mergeDufsNode(existingChild, incomingChild, existing);
                        mergedChildren.push(existingChild);
                        delete existingByPath[childKey];
                    } else {
                        if (existingChild) {
                            unregisterDufsNodeDom(existingChild);
                            delete existingByPath[childKey];
                        }
                        incomingChild.parent = existing;
                        if (existing.checked) {
                            setDufsNodeChecked(incomingChild, true);
                        }
                        mergedChildren.push(incomingChild);
                    }
                });

                Object.keys(existingByPath).forEach(function (key) {
                    unregisterDufsNodeDom(existingByPath[key]);
                });
                existing.children = mergedChildren;
                sortDufsNodes(existing.children);
                return existing;
            }

            function applyDufsTreeSnapshot(baseUrl, snapshot, options) {
                options = options || {};
                if (!dufsTreeState || !dufsTreeState.root || dufsTreeState.baseUrl !== baseUrl || options.replace) {
                    dufsTreeState = createDufsTreeState(baseUrl, snapshot.root, snapshot.errors);
                    refreshDufsTreeCheckState();
                    renderDufsTree({ preserveScroll: options.preserveScroll });
                    return;
                }

                var anchor = options.preserveScroll ? captureDufsScrollAnchor() : null;
                mergeDufsNode(dufsTreeState.root, snapshot.root, null);
                dufsTreeState.errors = snapshot.errors || 0;
                refreshDufsTreeCheckState();
                prepareDufsTreeFilterView();
                updateDufsTreeRowDom(dufsTreeState.root);
                syncDufsChildrenDom(dufsTreeState.root);
                updateDufsTreeSelectionStatus();
                if (options.preserveScroll) {
                    restoreDufsScrollAnchor(anchor);
                }
            }

            function createDufsSvgIcon(markup) {
                var holder = document.createElement('span');
                holder.innerHTML = markup.trim();
                return holder.firstElementChild;
            }

            function getDufsFileIconClass(name) {
                var lowerName = (name || '').toLowerCase();
                if (lowerName.endsWith('.mp4') || lowerName.endsWith('.webm')) {
                    return 'dufs-file-icon-video';
                }
                if (lowerName.endsWith('.srt') || lowerName.endsWith('.ass') || lowerName.endsWith('.sup')) {
                    return 'dufs-file-icon-subtitle';
                }
                if (lowerName.endsWith('.json')) {
                    return 'dufs-file-icon-data';
                }
                if (lowerName.endsWith('.html')) {
                    return 'dufs-file-icon-page';
                }
                if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') || lowerName.endsWith('.png') || lowerName.endsWith('.webp') || lowerName.endsWith('.gif') || lowerName.endsWith('.bmp')) {
                    return 'dufs-file-icon-image';
                }
                return '';
            }

            function getDufsFileIconMarkup(name) {
                var lowerName = (name || '').toLowerCase();
                if (lowerName.endsWith('.mp4') || lowerName.endsWith('.webm')) {

                        '<path d="m10 9 5 3-5 3V9Z" fill="currentColor"/>' +
                        '</svg>';
                }
                if (lowerName.endsWith('.srt') || lowerName.endsWith('.ass') || lowerName.endsWith('.sup')) {

                        '</svg>';
                }
                if (lowerName.endsWith('.json')) {
                    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +

                        '<path d="m13 7-2 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>' +
                        '</svg>';
                }
                if (lowerName.endsWith('.html')) {
                    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                        '<path d="M6.75 3.75h7.1l3.4 3.55v12.95H6.75V3.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>' +
                        '<path d="M9 12.2h6M9 15.5h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>' +
                        '</svg>';
                }
                if (lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') || lowerName.endsWith('.png') || lowerName.endsWith('.webp') || lowerName.endsWith('.gif') || lowerName.endsWith('.bmp')) {
                    return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                        '<rect x="4" y="5" width="16" height="14" rx="2.2" stroke="currentColor" stroke-width="1.7"/>' +
                        '<path d="m6.8 16 3.1-3.2 2.2 2.1 2.2-2.7 3 3.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
                        '<circle cx="15.8" cy="9.2" r="1.1" fill="currentColor"/>' +
                        '</svg>';
                }
                return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                    '<path d="M6.75 3.75h7.1l3.4 3.55v12.95H6.75V3.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>' +
                    '<path d="M13.75 3.9v3.55h3.35" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>' +
                    '</svg>';
            }

            function createDufsNodeIcon(node) {
                var icon = document.createElement('span');
                icon.className = 'dufs-node-icon ' + (node.type === 'dir' ? 'dufs-dir-icon' : 'dufs-file-icon ' + getDufsFileIconClass(node.name));
                if (node.type === 'dir') {
                    icon.appendChild(createDufsSvgIcon(
                        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                        '<path d="M3.75 7.25c0-1.1.9-2 2-2h4.1l2 2h6.4c1.1 0 2 .9 2 2v7.5c0 1.1-.9 2-2 2H5.75c-1.1 0-2-.9-2-2v-9.5Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>' +
                        '<path d="M3.9 10.2h16.2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>' +
                        '</svg>'
                    ));
                } else {
                    icon.appendChild(createDufsSvgIcon(getDufsFileIconMarkup(node.name)));
                }
                return icon;
            }

            function createDufsToggleIcon(expanded) {
                return createDufsSvgIcon(
                    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                    (expanded
                        ? '<path d="m6 15 6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'
                        : '<path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>') +
                    '</svg>'
                );
            }

            function renderDufsTreeNode(node) {
                var li = document.createElement('li');
                if (node.type === 'dir' && !getDufsNodeEffectiveExpanded(node)) {
                    li.classList.add('dufs-collapsed');
                }

                var row = document.createElement('div');
                row.className = 'dufs-tree-row ' + (node.type === 'dir' ? 'dufs-dir-row' : 'dufs-file-row');
                li.appendChild(row);

                if (node.type === 'dir') {
                    var toggle = document.createElement('button');
                    toggle.type = 'button';
                    toggle.className = 'dufs-toggle';
                    toggle.title = getDufsNodeEffectiveExpanded(node) ? '折叠' : '展开';
                    toggle.appendChild(createDufsToggleIcon(getDufsNodeEffectiveExpanded(node)));
                    toggle.addEventListener('click', function () {
                        toggleDufsNodeExpanded(node);
                    });
                    row.appendChild(toggle);
                } else {
                    var placeholder = document.createElement('span');
                    placeholder.className = 'dufs-toggle-placeholder';
                    row.appendChild(placeholder);
                }

                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'dufs-node-checkbox';
                var checkState = getDufsNodeDisplayCheckState(node);
                checkbox.checked = checkState.checked;
                checkbox.indeterminate = checkState.indeterminate;
                checkbox.disabled = checkState.disabled;
                if (node.type === 'file') {
                    checkbox.name = 'file';
                    checkbox.value = node.path;
                    checkbox.dataset.displayName = node.path;
                }
                checkbox.addEventListener('change', function () {
                    setDufsVisibleNodeChecked(node, checkbox.checked);
                    refreshDufsTreeCheckState();
                    prepareDufsTreeFilterView();
                    updateDufsVisibleRows();
                });
                row.appendChild(checkbox);
                var icon = createDufsNodeIcon(node);
                row.appendChild(icon);

                var name = document.createElement('span');
                name.className = 'dufs-node-name ' + (node.type === 'dir' ? 'dufs-dir-name' : 'dufs-file-name');
                name.textContent = node.type === 'dir' ? node.name + '/' : node.name;
                name.title = node.path || node.name;
                name.addEventListener('click', function () {
                    if (node.type === 'dir') {
                        toggleDufsNodeExpanded(node);
                        return;
                    }
                    node.checked = !node.checked;
                    refreshDufsTreeCheckState();
                    prepareDufsTreeFilterView();
                    updateDufsVisibleRows();
                });
                row.appendChild(name);

                if (node.type === 'dir') {
                    var childList = document.createElement('ul');
                    getDufsRenderableChildren(node).forEach(function (child) {
                        childList.appendChild(renderDufsTreeNode(child));
                    });
                    if (node.error) {
                        var errorItem = document.createElement('li');
                        errorItem.className = 'dufs-error';
                        errorItem.textContent = '读取失败：' + node.error;
                        childList.appendChild(errorItem);
                        node.dom = node.dom || {};
                        node.dom.errorItem = errorItem;
                    } else if (getDufsRenderableChildren(node).length === 0) {
                        var emptyItem = document.createElement('li');
                        emptyItem.className = 'dufs-empty';
                        emptyItem.textContent = hasActiveDufsTreeFilter() ? '没有匹配的文件' : '没有可加载文件';
                        childList.appendChild(emptyItem);
                        node.dom = node.dom || {};
                        node.dom.emptyItem = emptyItem;
                    }
                    li.appendChild(childList);
                }

                registerDufsNodeDom(node, {
                    li: li,
                    row: row,
                    checkbox: checkbox,
                    icon: icon,
                    name: name,
                    toggle: toggle || null,
                    childList: childList || null,
                    emptyItem: node.dom && node.dom.emptyItem ? node.dom.emptyItem : null,
                    errorItem: node.dom && node.dom.errorItem ? node.dom.errorItem : null
                });
                return li;
            }

            function updateDufsVisibleRows() {

            function clearFocusVideoTimer() {
                if (focusVideoTimer === null) return;
                clearTimeout(focusVideoTimer);
                focusVideoTimer = null;
            }

            function isFocusProtectedControl(element) {
                if (!element) return false;
                if (element.isContentEditable) return true;
                if (element.tagName === 'TEXTAREA' || element.tagName === 'SELECT') return true;
                if (element.tagName !== 'INPUT') return false;

                var inputType = (element.type || 'text').toLowerCase();
                return ['text', 'search', 'url', 'email', 'tel', 'password', 'number'].indexOf(inputType) !== -1;
            }

            function isFocusRegressionBlocked() {
                return focusRegressionBlockers.size > 0;
            }

            function requestVideoFocusReturn() {
                clearFocusVideoTimer();
                if (isFocusRegressionBlocked() || isFocusProtectedControl(document.activeElement)) {
                    focusReturnPending = true;
                    return false;
                }

                focusReturnPending = false;
                focusVideoElement.focus();
                return true;
            }

            function scheduleVideoFocusReturn() {
                clearFocusVideoTimer();
                focusReturnPending = true;

                if (isFocusRegressionBlocked() || isFocusProtectedControl(document.activeElement)) return;
                focusVideoTimer = setTimeout(function () {
                    focusVideoTimer = null;
                    requestVideoFocusReturn();
                }, FOCUS_VIDEO_DELAY_MS);
            }

            function setFocusRegressionBlocker(blockerId, isBlocked) {
                var wasBlocked = isFocusRegressionBlocked();
                if (isBlocked) {
                    focusRegressionBlockers.add(blockerId);
                    focusReturnPending = true;
                    clearFocusVideoTimer();
                    return;
                }

                focusRegressionBlockers.delete(blockerId);
                if (wasBlocked && !isFocusRegressionBlocked()) {
                    clearFocusVideoTimer();
                    focusReturnPending = false;
                    focusVideoElement.focus();
                }
            }

                focusVideoElement.onfocus = function () {
                    clearFocusVideoTimer();
                    focusReturnPending = false;
                    statusIcon.innerHTML = '✔️<span style="color: #00D26A;">聚焦</span>';
                }
            })();

            document.addEventListener('focusin', function (event) {
                if (!isFocusProtectedControl(event.target)) return;
                focusReturnPending = true;
                clearFocusVideoTimer();
            });

            document.addEventListener('focusout', function (event) {
                if (!isFocusProtectedControl(event.target)) return;
                setTimeout(function () {
                    if (!focusReturnPending) return;
                    if (isFocusRegressionBlocked() || isFocusProtectedControl(document.activeElement)) return;

                    "[": -0.1,  // 左中括号：减速0.1

                    // 焦点在输入控件内时不拦截，避免吞掉正常输入（如 AI 对话框里打 [ ] \）
                    const target = event.target;
                    if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable)) {
                        return;
                    }

                    // 检查是否是我们需要处理的热键
